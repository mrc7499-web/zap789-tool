<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0;
  font-family: system-ui;
  display:flex;
  height:100vh;
  background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#0f172a;
  color:#fff;
  padding:10px;
}
.sidebar div {
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}
.sidebar div:hover {
  background:#1e293b;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card {
  background:#fff;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  transition:.2s;
}
.card:hover {
  transform:translateY(-2px);
}

/* TEXT */
.text {
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.text:hover {
  background:#f1f5f9;
}

/* BUTTON */
.btn {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}
.copy { background:#22c55e; color:#fff; }
.del { background:#ef4444; color:#fff; }

/* SEARCH */
input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:#fff;
  padding:10px 15px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<div class="sidebar" id="menu"></div>

<div class="main">
  <input id="search" placeholder="ค้นหา..." oninput="load()">
  <div id="list"></div>
</div>

<div id="toast" class="toast">คัดลอกแล้ว</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let user = localStorage.getItem("user") || "";
let role = localStorage.getItem("role") || "";
let currentCat = "ทั้งหมด";

/* LOGIN */
if(!user){
  const u = prompt("username");
  const p = prompt("password");

  fetch(`${API}?action=login&username=${u}&password=${p}`)
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      localStorage.setItem("user", u);
      localStorage.setItem("role", res.role);
      location.reload();
    } else {
      alert("รหัสผิด");
    }
  });
}

/* TOAST */
function toast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1000);
}

/* LOAD */
function load(){
  fetch(`${API}?action=get`)
  .then(r=>r.json())
  .then(data=>{
    let html="";
    let cats = new Set(["ทั้งหมด"]);
    const search = document.getElementById("search").value.toLowerCase();

    data.forEach((row,i)=>{
      cats.add(row[0]);

      if(currentCat !== "ทั้งหมด" && row[0] !== currentCat) return;
      if(search && !row[1].toLowerCase().includes(search)) return;

      html+=`
      <div class="card">
        <b>${row[0]}</b>

        <div class="text" onclick="copy(\`${row[1]}\`)">
          ${row[1]}
        </div>

        <input value="${row[1]}" onchange="edit(${i}, this.value)" />

        <button class="btn copy" onclick="copy(\`${row[1]}\`)">Copy</button>

        ${role==="admin" ? `<button class="btn del" onclick="del(${i})">ลบ</button>` : ""}
      </div>`;
    });

    document.getElementById("list").innerHTML = html;
    renderMenu([...cats]);
  });
}

/* MENU */
function renderMenu(cats){
  let html="";
  cats.forEach(c=>{
    html+=`<div onclick="selectCat('${c}')">${c}</div>`;
  });
  document.getElementById("menu").innerHTML = html;
}

function selectCat(c){
  currentCat = c;
  load();
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text);
  toast();
}

/* EDIT */
function edit(i,val){
  fetch(`${API}?action=edit&index=${i}&text=${encodeURIComponent(val)}&user=${user}`);
}

/* DELETE */
function del(i){
  if(!confirm("ลบ?")) return;
  fetch(`${API}?action=delete&index=${i}&user=${user}`)
  .then(()=>load());
}

load();
</script>

</body>
</html>
