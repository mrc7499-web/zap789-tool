<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 Tool</title>

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }

.header{
  background:#ff7a00;
  color:white;
  padding:15px;
  font-size:20px;
}

.container{ display:flex; }

.sidebar{
  width:200px;
  background:#fff;
  padding:10px;
}

.menu{
  padding:10px;
  margin:5px 0;
  cursor:pointer;
  border-radius:8px;
}

.menu.active{
  background:#ff7a00;
  color:white;
}

.main{
  flex:1;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.actions button{
  margin-right:5px;
}

.login{
  text-align:center;
  margin-top:100px;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div id="loginPage" class="login">
<h2>Login</h2>
<input id="u" placeholder="username"><br><br>
<input id="p" type="password" placeholder="password"><br><br>
<button onclick="login()">เข้า</button>
</div>

<div id="app" style="display:none">
<div class="header">🔥 Zap789</div>

<div class="container">

<div class="sidebar" id="menu"></div>

<div class="main">
<input id="search" placeholder="ค้นหา..." oninput="render()"><br><br>

<input id="cat" placeholder="หมวด">
<input id="text" placeholder="ข้อความ">
<button onclick="add()">+ เพิ่ม</button>

<div id="list"></div>
</div>

</div>
</div>

<div id="toast" class="toast">Copied</div>

<script>
const API="YOUR_SCRIPT_URL";

let DATA=[];
let ADMINS=[];
let role="";
let user="";
let currentCat="ทั้งหมด";

function login(){
  fetch(`${API}?action=login&username=${u.value}&password=${p.value}`)
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      role=d.role;
      user=d.user;
      localStorage.setItem("user",user);
      start();
    }else alert("ผิด");
  });
}

function start(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  load();
  loadAdmins();
}

function load(){
  fetch(`${API}?action=get`)
  .then(r=>r.json())
  .then(d=>{
    DATA=d;
    render();
  });
}

function loadAdmins(){
  fetch(`${API}?action=admins`)
  .then(r=>r.json())
  .then(d=>{
    ADMINS=d.map(x=>x[0]);
  });
}

function randomName(){
  if(ADMINS.length===0) return "แอดมิน";
  return ADMINS[Math.floor(Math.random()*ADMINS.length)];
}

function copyText(text){
  const final = text.replaceAll("{name}", randomName());
  navigator.clipboard.writeText(final);
  showToast();
}

function showToast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

function render(){
  let html="";
  let cats=new Set(["ทั้งหมด"]);

  DATA.forEach((r,i)=>{
    if(r[2]==="deleted") return;

    cats.add(r[0]);

    if(currentCat!=="ทั้งหมด" && r[0]!==currentCat) return;
    if(search.value && !r[1].includes(search.value)) return;

    html+=`
    <div class="card">
      <div onclick="copyText(\`${r[1]}\`)">
        <b>${r[0]}</b><br>${r[1]}
      </div>

      <div class="actions">
        <button onclick="edit(${i},\`${r[1]}\`)">✏️</button>
        ${role==="admin" ? `<button onclick="del(${i})">🗑</button>`:""}
      </div>
    </div>`;
  });

  list.innerHTML=html;

  let m="";
  cats.forEach(c=>{
    m+=`<div class="menu ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</div>`;
  });
  menu.innerHTML=m;
}

function add(){
  fetch(`${API}?action=add&cat=${cat.value}&text=${text.value}&user=${user}`)
  .then(()=>load());
}

function edit(i,old){
  const t=prompt("แก้ไข",old);
  if(!t) return;
  fetch(`${API}?action=edit&row=${i}&text=${t}&user=${user}`)
  .then(()=>load());
}

function del(i){
  fetch(`${API}?action=delete&row=${i}&user=${user}`)
  .then(()=>load());
}

start();
</script>

</body>
</html>
