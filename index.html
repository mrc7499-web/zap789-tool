<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789</title>

<style>
body {font-family:sans-serif;margin:0;background:#f4f6f9;}
header {background:#ff7a00;color:#fff;padding:15px;text-align:center;}
.container {display:flex}
.sidebar {width:200px;background:#fff;padding:10px}
.sidebar button {width:100%;margin:5px 0;padding:10px;border:none;background:#eee;cursor:pointer}
.main {flex:1;padding:20px}
.card {background:#fff;padding:10px;margin:10px 0;border-radius:10px;display:flex;justify-content:space-between}
.edit {border:none;width:100%;background:transparent}
.btn {margin-left:5px;padding:5px 10px;border:none;cursor:pointer}
.copy{background:#4caf50;color:#fff}
.del{background:red;color:#fff}
.restore{background:blue;color:#fff}
</style>

</head>

<body>

<header>🔥 Zap789 Admin</header>

<div id="loginBox" style="padding:20px;">
  <input id="user" placeholder="user"><br><br>
  <input id="pass" type="password" placeholder="pass"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="sidebar">
  <button onclick="mode='active';render()">📂 ข้อความ</button>
  <button onclick="mode='trash';render()">🗑 ถังขยะ</button>
</div>

<div class="main">
<input id="search" placeholder="ค้นหา..." oninput="render()"><br><br>
<div id="list"></div>
</div>

</div>
</div>

<script>

let DATA=[];
let user="";
let role="";
let mode="active";

function login(){
  google.script.run.withSuccessHandler(res=>{
    if(res.status==="success"){
      user=res.user;
      role=res.role;
      loginBox.style.display="none";
      app.style.display="block";
      load();
    }else alert("ผิด");
  }).login(userInput.value, pass.value);
}

function load(){
  google.script.run.withSuccessHandler(res=>{
    DATA=res.slice(1);
    render();
  }).getData();
}

function render(){
  let kw=search.value.toLowerCase();
  let list=DATA.filter((d)=>{

    if(mode==="active" && d[2]!=="active") return false;
    if(mode==="trash" && d[2]!=="deleted") return false;

    return d[1].toLowerCase().includes(kw);
  });

  listDiv.innerHTML="";

  list.forEach((d,i)=>{
    listDiv.innerHTML+=`
    <div class="card">
      <input class="edit" value="${d[1]}" 
        onchange="edit(${i},this.value)">
      <div>
        <button class="btn copy" onclick="copy('${d[1]}')">📋</button>

        ${role==="admin" ? `
          ${mode==="active" 
            ? `<button class="btn del" onclick="del(${i})">ลบ</button>`
            : `<button class="btn restore" onclick="restore(${i})">กู้คืน</button>`
          }
        ` : ""}
      </div>
    </div>`;
  });
}

function copy(t){
  navigator.clipboard.writeText(t);
  alert("คัดลอกแล้ว");
}

function edit(i,text){
  let row=i+2;
  google.script.run.updateRow(row,text);
  google.script.run.addLog(user,"edit",text);
}

function del(i){
  let row=i+2;
  google.script.run.deleteRow(row);
  google.script.run.addLog(user,"delete",DATA[i][1]);
  load();
}

function restore(i){
  let row=i+2;
  google.script.run.restoreRow(row);
  google.script.run.addLog(user,"restore",DATA[i][1]);
  load();
}

</script>

</body>
</html>
