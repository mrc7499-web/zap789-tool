<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let currentCat="ทั้งหมด";

/* 🚀 แสดงก่อน (ไม่รอ API) */
function init(){
  showLoading();
  loadData(); // โหลด async
}

init();

/* 🚀 skeleton */
function showLoading(){
  let html="";
  for(let i=0;i<8;i++){
    html+=`<div class="card">⏳ โหลด...</div>`;
  }
  grid.innerHTML=html;
}

/* 🚀 โหลดแบบไม่บล็อก */
async function loadData(){
  try{
    const res=await fetch(API+"?action=get");
    DATA=await res.json();
  }catch(e){
    DATA=[];
  }
  render();
}

/* 🚀 render เร็ว */
function render(){
  let html="";
  const s=(search.value||"").toLowerCase();

  for(let i=0;i<DATA.length;i++){
    const [cat,text,status,img]=DATA[i];

    if(status==="deleted") continue;
    if(s && !text.toLowerCase().includes(s)) continue;

    html+=`
    <div class="card">

      ${img ? `<img src="${img}" class="img" onclick="copyImage('${img}')">`:""}

      <div onclick="copyText(\`${text}\`)">
        ${text.replaceAll("{name}",'<span class="var">{name}</span>')}
      </div>

    </div>`;
  }

  grid.innerHTML=html;
}
</script>
