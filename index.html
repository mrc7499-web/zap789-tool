<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 Admin Dashboard</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#f5f6fa;
}

/* Layout */
.container {
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:230px;
  background:#ffffff;
  border-right:1px solid #eee;
  padding:20px;
}

.sidebar h2 {
  color:#ff7a00;
  font-size:18px;
}

.menu button {
  display:block;
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  background:#f3f4f6;
  border-radius:8px;
  cursor:pointer;
}

.menu button.active {
  background:#ff7a00;
  color:white;
}

/* Main */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Topbar */
.topbar {
  background:white;
  padding:10px;
  border-bottom:1px solid #eee;
}

.search {
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

/* Chat */
.chat {
  flex:1;
  overflow:auto;
  padding:20px;
}

.card {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #eee;
}

.admin {
  border-left:5px solid #ff7a00;
}

.pin {
  float:right;
  cursor:pointer;
}

/* Login */
.login {
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}

.login-box {
  background:white;
  padding:30px;
  border-radius:12px;
  width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input {
  width:100%;
  margin:10px 0;
  padding:10px;
}

button.login-btn {
  width:100%;
  padding:10px;
  background:#ff7a00;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="login-box">
    <h3>🔐 Admin Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="login-btn" onclick="login()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🔥 Zap789</h2>
    <div class="menu">
      <button onclick="filter('ทั้งหมด')" class="active">ทั้งหมด</button>
      <button onclick="filter('สมัคร')">สมัคร</button>
      <button onclick="filter('ฝากถอน')">ฝากถอน</button>
      <button onclick="filter('โปร')">โปร</button>
      <button onclick="filter('ปัญหา')">ปัญหา</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <input class="search" placeholder="🔍 ค้นหา..." oninput="search(this.value)">
    </div>

    <div class="chat" id="chat"></div>
  </div>

</div>

<script>
// ====== CONFIG ======
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkr3XpU1tsvsaTXvoo7gb4VmQy7QBTK6rcAc4bzh1dcqgsfHnfeb7SOHoeo-ns92IOyrIhh5z-Ejb/pub?output=csv";
const USER_SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkr3XpU1tsvsaTXvoo7gb4VmQy7QBTK6rcAc4bzh1dcqgsfHnfeb7SOHoeo-ns92IOyrIhh5z-Ejb/pub?gid=1998216884&single=true&output=csv";

let data = [];
let users = [];
let current = "ทั้งหมด";

// ====== LOAD USERS ======
async function loadUsers(){
  const res = await fetch(USER_SHEET);
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  users = rows.map(r=>{
    let c=r.split(",");
    return {u:c[0], p:c[1]};
  });
}

// ====== LOGIN ======
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  let ok = users.find(x=>x.u===u && x.p===p);

  if(ok){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="flex";
  } else {
    alert("❌ รหัสผิด");
  }
}

// ====== LOAD DATA ======
async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  data = rows.map(r=>{
    let c=r.split(",");
    return {
      name:c[0],
      msg:c[1],
      type:c[2],
      role:c[3]
    }
  });

  render();
}

// ====== RENDER ======
function render(){
  let html="";

  data
  .filter(x=> current==="ทั้งหมด" || x.type===current)
  .forEach(x=>{
    html+=`
    <div class="card ${x.role==='admin'?'admin':''}">
      <b>${x.name}</b>
      <span class="pin">📌</span>
      <div>${x.msg}</div>
    </div>
    `;
  });

  document.getElementById("chat").innerHTML=html;
}

// ====== FILTER ======
function filter(t){
  current=t;
  render();
}

// ====== SEARCH ======
function search(v){
  let html="";
  data
  .filter(x=> x.msg.includes(v))
  .forEach(x=>{
    html+=`
    <div class="card">
      <b>${x.name}</b>
      <div>${x.msg}</div>
    </div>
    `;
  });

  document.getElementById("chat").innerHTML=html;
}

// INIT
loadUsers();
load();
</script>

</body>
</html>
