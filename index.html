<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.dark{background:#111;color:#eee}

/* HEADER (Sticky) */
.header{
  position:sticky;
  top:0;
  z-index:10;
  background:#ff7a00;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

/* SEARCH */
.search{
  padding:8px;
  border-radius:8px;
  border:none;
  width:240px;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:8px;
  overflow:auto;
}
.cat{
  background:#fff;
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
  font-size:13px;
}
.cat.active{background:#000;color:#fff}

/* GRID (4 columns) */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  line-height:1.5;
  font-size:14px;
}
.dark .card{background:#1e1e1e}

.card:hover{transform:scale(1.02)}

/* COLOR BAR */
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
}
.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}
.orange::before{background:#f97316}

/* CATEGORY TEXT (จาง) */
.cat-label{
  font-size:11px;
  color:#888;
  margin-bottom:6px;
}

/* VARIABLE */
.var{
  background:#eee;
  border-radius:6px;
  padding:2px 6px;
  border:1px solid #ddd;
}
.dark .var{
  background:#2a2f3a;
  color:#fff;
  border:1px solid #444;
}

/* ACTION */
.actions{
  position:absolute;
  top:6px;
  right:6px;
  display:none;
}
.card:hover .actions{display:block}

/* STAR */
.star{
  position:absolute;
  top:6px;
  left:6px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
}
.dark .modal-box{background:#222;color:#fff}
</style>
</head>

<body>

<div class="header">
  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">

  <div id="cats" class="categories"></div>

  <button onclick="toggleDark()">🌙</button>
  <button onclick="openHelp()">❓</button>
</div>

<div id="grid" class="grid"></div>

<div id="toast" class="toast">✅ คัดลอกแล้ว</div>

<div id="help" class="modal">
  <div class="modal-box">
    <h3>⚡ วิธีใช้งาน</h3>
    <p>คลิกการ์ด = คัดลอก</p>
    <p>Alt+1-4 = ข้อความด่วน</p>
    <p>{name} = ระบบใส่ให้</p>
    <button onclick="closeHelp()">ปิด</button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[], ADMINS=[];
let favorites=new Set();
let currentCat="ทั้งหมด";

/* INIT */
async function init(){
  DATA=await fetch(`${API}?action=get`).then(r=>r.json());
  ADMINS=(await fetch(`${API}?action=admins`).then(r=>r.json())).map(x=>x[0]);
  render();
}
init();

/* RANDOM NAME */
function randomName(){
  return ADMINS[Math.floor(Math.random()*ADMINS.length)]||"แอดมิน";
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text.replaceAll("{name}",randomName()));
  showToast();
}

/* TOAST */
function showToast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1200);
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* COLOR */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  if(cat.includes("สมัคร")) return "blue";
  return "orange";
}

/* PIN */
function toggleFav(i){
  favorites.has(i)?favorites.delete(i):favorites.add(i);
  render();
}

/* HIGHLIGHT */
function highlight(text){
  return text.replaceAll("{name}", `<span class="var">{name}</span>`);
}

/* SORT */
function sorted(){
  return [...DATA.keys()].sort((a,b)=>favorites.has(b)-favorites.has(a));
}

/* RENDER */
function render(){
  let html="";
  let cats=new Set(["ทั้งหมด"]);
  const s=(search.value||"").toLowerCase();

  sorted().forEach(i=>{
    const [cat,text,status,tags]=DATA[i];
    if(status==="deleted") return;

    cats.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s) && !(tags||"").includes(s)) return;

    html+=`
    <div class="card ${getColor(cat)}" onclick="copy(\`${text}\`)">

      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${favorites.has(i)?"⭐":"☆"}
      </div>

      <div class="cat-label">${cat}</div>

      ${highlight(text)}

      <div class="actions">
        <button onclick="event.stopPropagation();edit(${i})">✏️</button>
        <button onclick="event.stopPropagation();del(${i})">🗑</button>
      </div>

    </div>`;
  });

  grid.innerHTML=html;

  let cHTML="";
  cats.forEach(c=>{
    const count=DATA.filter(x=>x[0]===c).length;
    cHTML+=`<div class="cat ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c} (${count})</div>`;
  });
  cats.innerHTML=cHTML;
}

/* EDIT */
function edit(i){
  const t=prompt("แก้",DATA[i][1]);
  if(!t) return;
  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`).then(init);
}

/* DELETE */
function del(i){
  fetch(`${API}?action=delete&row=${i}`).then(init);
}

/* SHORTCUT */
document.addEventListener("keydown",e=>{
  if(e.altKey){
    let n=parseInt(e.key);
    if(n>=1 && n<=4){
      let i=sorted()[n-1];
      if(i!==undefined) copy(DATA[i][1]);
    }
  }
});

/* HELP */
function openHelp(){help.style.display="flex"}
function closeHelp(){help.style.display="none"}
</script>

</body>
</html>
