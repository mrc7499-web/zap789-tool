<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f4f4}
.dark{background:#121212;color:#fff}

/* HEADER */
.header{
position:sticky;top:0;background:#ff7a00;padding:10px;z-index:100
}
.top{display:flex;justify-content:space-between;align-items:center}
.search{padding:8px;border-radius:8px;border:none}

/* CATEGORY */
.categories{display:flex;gap:8px;margin-top:8px;overflow:auto}
.cat{background:#fff;padding:6px 12px;border-radius:20px;cursor:pointer}
.cat.active{background:#000;color:#fff}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:16px}

/* CARD */
.card{background:#fff;border-radius:10px;overflow:hidden;position:relative}
.dark .card{background:#1e1e1e}

/* COLOR BAR */
.card::before{content:"";position:absolute;left:0;top:0;width:4px;height:100%}
.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}

/* STAR */
.star{position:absolute;top:10px;right:10px}

/* ACTION */
.actions{
position:absolute;top:10px;left:10px;display:none;gap:6px
}
.card:hover .actions{display:flex}
.btn{background:#000;color:#fff;padding:4px 6px;border-radius:6px}

/* IMAGE */
.img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
cursor:pointer;
}

/* CONTENT */
.content{padding:12px;line-height:1.5;cursor:pointer}

/* VAR */
.var{background:#eee;padding:2px 6px;border-radius:6px}
.dark .var{background:#2a2a2a}

/* TOAST */
.toast{
position:fixed;bottom:20px;right:20px;
background:#000;color:#fff;padding:10px;border-radius:8px;
opacity:0;transition:.3s
}
</style>
</head>

<body>

<div class="header">
<div class="top">
🔥 Zap789 PRO
<input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
<button onclick="toggleDark()">🌙</button>
</div>
<div id="cats" class="categories"></div>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast"></div>

<script>
const API="PASTE_URL_HERE"; // ใส่ของคุณ

let DATA=[];
let currentCat="ทั้งหมด";

/* LOAD */
async function init(){
const res=await fetch(API);
DATA=await res.json();
render();
}
init();

/* COLOR */
function getColor(cat){
if(cat.includes("ฝาก")) return "green";
if(cat.includes("ปัญหา")) return "red";
if(cat.includes("ทัก")) return "pink";
return "blue";
}

/* COPY TEXT */
function copyText(text){
navigator.clipboard.writeText(text);
toast("✅ คัดลอกสำเร็จ");
}

/* COPY IMAGE */
async function copyImage(url){
const res=await fetch(url);
const blob=await res.blob();
await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
toast("✅ คัดลอกสำเร็จ");
}

/* TOAST */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,1000);
}

/* RENDER */
function render(){
const s=(search.value||"").toLowerCase();
let html="";
let catSet=new Set(["ทั้งหมด"]);

DATA.forEach((r,i)=>{
const [cat,text,status,img]=r;
if(status==="deleted") return;

catSet.add(cat);

if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
if(s && !text.toLowerCase().includes(s)) return;

html+=`
<div class="card ${getColor(cat)}">

<div class="actions">
<div class="btn" onclick="event.stopPropagation();remove(${i})">🗑️</div>
</div>

<div class="star">⭐</div>

${img?`<img src="${img}" class="img" onclick="event.stopPropagation();copyImage('${img}')">`:""}

<div class="content" onclick="copyText(\`${text}\`)">
${text.replaceAll("{name}",'<span class="var">{name}</span>')}
</div>

</div>`;
});

grid.innerHTML=html;

/* CATEGORY */
let cHTML="";
catSet.forEach(c=>{
cHTML+=`<div class="cat ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</div>`;
});
document.getElementById("cats").innerHTML=cHTML;
}

/* DELETE */
async function remove(i){
await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"delete",
row:i+2
})
});
init();
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
