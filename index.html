<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
.header{background:#ff7a00;color:#fff;padding:15px;font-size:20px}
.container{display:flex}
.sidebar{width:200px;background:#fff;padding:10px}
.menu{padding:10px;margin:5px 0;border-radius:8px;cursor:pointer}
.menu.active{background:#ff7a00;color:#fff}
.main{flex:1;padding:20px}

.card{background:#fff;padding:15px;margin-bottom:10px;border-radius:10px}
.text{margin-bottom:10px}
input.inline{width:100%;padding:5px}

.actions button{margin-right:5px}

.toast{position:fixed;bottom:20px;right:20px;background:#000;color:#fff;padding:10px;border-radius:8px;opacity:0}
</style>
</head>

<body>

<div id="loginPage" style="text-align:center;margin-top:120px">
<h2>Login</h2>
<input id="u"><br><br>
<input id="p" type="password"><br><br>
<button onclick="login()">เข้า</button>
</div>

<div id="app" style="display:none">

<div class="header">🔥 Zap789 PRO</div>

<div class="container">

<div class="sidebar" id="menu"></div>

<div class="main">

<input id="search" placeholder="ค้นหา..." oninput="render()"><br><br>

<input id="cat" placeholder="หมวด">
<input id="text" placeholder="ข้อความ">
<button onclick="add()">+ เพิ่ม</button>

<hr>

<button onclick="viewMode='normal';render()">📋 ปกติ</button>
<button onclick="viewMode='trash';render()">🗑 Trash</button>
<button onclick="showLogs()">📜 Log</button>

<div id="list"></div>

</div>
</div>
</div>

<div id="toast" class="toast">Copied</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[], ADMINS=[], role="", user="", currentCat="ทั้งหมด", viewMode="normal";

window.onload=()=>{
  const u=localStorage.getItem("user");
  const r=localStorage.getItem("role");
  if(u){ user=u; role=r; start(); }
};

function login(){
  fetch(`${API}?action=login&username=${u.value}&password=${p.value}`)
  .then(r=>r.json())
  .then(d=>{
    if(d.success){
      user=d.user; role=d.role;
      localStorage.setItem("user",user);
      localStorage.setItem("role",role);
      start();
    } else alert("ผิด");
  });
}

function start(){
  loginPage.style.display="none";
  app.style.display="block";
  load(); loadAdmins();
}

function load(){
  fetch(`${API}?action=get`).then(r=>r.json()).then(d=>{DATA=d;render();});
}

function loadAdmins(){
  fetch(`${API}?action=admins`).then(r=>r.json()).then(d=>{ADMINS=d.map(x=>x[0]);});
}

function randomName(){
  return ADMINS[Math.floor(Math.random()*ADMINS.length)]||"แอดมิน";
}

function copyText(t){
  navigator.clipboard.writeText(t.replaceAll("{name}",randomName()));
  toast.style.opacity=1; setTimeout(()=>toast.style.opacity=0,1000);
}

function render(){
  let html=""; let cats=new Set(["ทั้งหมด"]);
  const s=search.value.toLowerCase();

  DATA.forEach((r,i)=>{
    const [cat,text,status]=r;
    cats.add(cat);

    if(viewMode==="normal" && status==="deleted") return;
    if(viewMode==="trash" && status!=="deleted") return;
    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card">

      <div onclick="copyText(\`${text}\`)">
        <b>${cat}</b>
      </div>

      <input class="inline" value="${text}" onchange="edit(${i},this.value)">

      <div class="actions">
        ${viewMode==="normal" && role==="admin" ? `<button onclick="del(${i})">🗑</button>`:""}
        ${viewMode==="trash" ? `<button onclick="restore(${i})">♻️</button>`:""}
      </div>

    </div>`;
  });

  list.innerHTML=html;

  let m="";
  cats.forEach(c=>{
    m+=`<div class="menu ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</div>`;
  });
  menu.innerHTML=m;
}

function add(){
  fetch(`${API}?action=add&cat=${cat.value}&text=${text.value}&user=${user}`).then(()=>load());
}

function edit(i,val){
  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(val)}&user=${user}`);
}

function del(i){
  fetch(`${API}?action=delete&row=${i}&user=${user}`).then(()=>load());
}

function restore(i){
  fetch(`${API}?action=restore&row=${i}&user=${user}`).then(()=>load());
}

function showLogs(){
  fetch(`${API}?action=logs`).then(r=>r.json()).then(d=>{
    let html="";
    d.reverse().forEach(r=>{
      html+=`<div class="card">${r.join(" | ")}</div>`;
    });
    list.innerHTML=html;
  });
}
</script>

</body>
</html>
