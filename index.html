<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; background:#f5f6fa; margin:0; }
.container { max-width:800px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }
button { padding:6px 10px; margin:3px; border:none; border-radius:6px; cursor:pointer; }
.copy { background:#2ecc71; color:#fff; }
.del { background:#e74c3c; color:#fff; }
.add { background:#3498db; color:#fff; }
.login { max-width:300px; margin:100px auto; }
input { width:100%; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<div id="loginBox" class="login">
  <h3>Login</h3>
  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">เข้า</button>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <h2>📋 Zap789 Tool</h2>

    <input id="cat" placeholder="หมวด">
    <input id="text" placeholder="ข้อความ">
    <button class="add" onclick="add()">+ เพิ่ม</button>

    <div id="list"></div>
  </div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let currentUser = "";

// 🔐 SESSION AUTO LOGIN
window.onload = () => {
  const saved = localStorage.getItem("user");
  if (saved) {
    currentUser = saved;
    loginBox.style.display = "none";
    app.style.display = "block";
    load();
  }
};

// 🔐 LOGIN
function login(){
  const u = user.value;
  const p = pass.value;

  fetch(`${API}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      localStorage.setItem("user", u);
      currentUser = u;

      loginBox.style.display="none";
      app.style.display="block";
      load();
    } else {
      alert("รหัสผิด");
    }
  });
}

// 📥 LOAD
function load(){
  fetch(`${API}?action=get`)
  .then(r=>r.json())
  .then(data=>{
    let html="";

    data.forEach((row,i)=>{
      const safeText = row[1].replace(/`/g,"");

      html+=`
      <div class="card">
        <b>${row[0]}</b><br>

        <input value="${safeText}" onchange="edit(${i}, this.value)" />

        <br>
        <button class="copy" onclick="copyText(\`${safeText}\`)">Copy</button>
        <button class="del" onclick="del(${i})">ลบ</button>
      </div>`;
    });

    list.innerHTML = html;
  });
}

// ➕ ADD
function add(){
  const c = cat.value;
  const t = text.value;

  if(!c || !t){
    alert("กรอกให้ครบ");
    return;
  }

  fetch(`${API}?action=add&cat=${encodeURIComponent(c)}&text=${encodeURIComponent(t)}`)
  .then(()=>{
    cat.value="";
    text.value="";
    load();
  });
}

// 🗑 DELETE
function del(i){
  if(!confirm("ลบใช่ไหม")){
    return;
  }

  fetch(`${API}?action=delete&index=${i}&user=${currentUser}`)
  .then(()=>load());
}

// ✏️ EDIT
function edit(i,val){
  fetch(`${API}?action=edit&index=${i}&text=${encodeURIComponent(val)}&user=${currentUser}`);
}

// 📋 COPY
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("คัดลอกแล้ว");
}

</script>

</body>
</html>
