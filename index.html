<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#ff7a00;
  padding:10px;
  color:#fff;
}

.search{
  padding:8px;
  border:none;
  border-radius:8px;
  width:200px;
}

/* CATEGORY */
.categories{
  margin-top:8px;
  display:flex;
  gap:8px;
  overflow:auto;
}
.cat{
  background:#fff;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
}
.cat.active{
  background:#000;
  color:#fff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:16px;
}

/* CARD */
.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  line-height:1.5;
  position:relative;
}

/* STAR */
.star{
  position:absolute;
  top:8px;
  right:8px;
}

/* IMAGE */
.img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:6px;
}

/* VARIABLE */
.var{
  background:#eee;
  padding:2px 6px;
  border-radius:6px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  opacity:0;
}
</style>
</head>

<body>

<div class="header">
  🔥 Zap789 PRO<br>
  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
  <div id="cats" class="categories"></div>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let currentCat="ทั้งหมด";

/* 🚀 โหลดจาก cache ก่อน (เร็วทันที) */
function loadCache(){
  const cache=localStorage.getItem("zap_data");
  if(cache){
    DATA=JSON.parse(cache);
    render();
  }
}

/* 🚀 โหลด API แบบ background */
async function loadAPI(){
  try{
    const res=await fetch(API+"?action=get");
    const data=await res.json();

    if(Array.isArray(data)){
      DATA=data;
      localStorage.setItem("zap_data", JSON.stringify(data));
      render();
    }

  }catch(e){
    console.log("API fail ใช้ cache");
  }
}

/* INIT */
loadCache();   // แสดงทันที
loadAPI();     // อัปเดตทีหลัง

/* COPY TEXT */
function copyText(text){
  navigator.clipboard.writeText(text);
  toast("✅ คัดลอกข้อความ");
}

/* COPY IMAGE */
async function copyImage(url){
  try{
    const res=await fetch(url);
    const blob=await res.blob();

    await navigator.clipboard.write([
      new ClipboardItem({[blob.type]: blob})
    ]);

    toast("✅ คัดลอกรูป");

  }catch{
    alert("ไม่รองรับ copy รูป");
  }
}

/* TOAST */
function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

/* RENDER */
function render(){
  const s=(search.value||"").toLowerCase();
  let html="";
  let cats=new Set(["ทั้งหมด"]);

  DATA.forEach((r,i)=>{
    const [cat,text,status,img]=r;
    if(status==="deleted") return;

    cats.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card">

      <div class="star">⭐</div>

      ${img ? `<img src="${img}" class="img" onclick="copyImage('${img}')">`:""}

      <div onclick="copyText(\`${text}\`)">
        ${text.replaceAll("{name}",'<span class="var">{name}</span>')}
      </div>

    </div>`;
  });

  grid.innerHTML=html;

  /* CATEGORY */
  let cHTML="";
  cats.forEach(c=>{
    cHTML+=`
    <div class="cat ${c===currentCat?"active":""}"
    onclick="currentCat='${c}';render()">${c}</div>`;
  });

  document.getElementById("cats").innerHTML=cHTML;
}
</script>

</body>
</html>
