<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO | Perfect Edition</title>

<style>
:root {
  --primary:#ff7a00;
  --bg:#f4f4f4;
  --card-bg:#ffffff;
  --text:#333;
  --var-bg:#eee;

  --blue-soft:#e0f2fe;
  --blue-strong:#0284c7;

  --green-soft:#dcfce7;
  --green-strong:#16a34a;

  --purple-soft:#ede9fe;
  --purple-strong:#6d28d9;

  --pink-soft:#fce7f3;
  --pink-strong:#db2777;

  --red-soft:#fee2e2;
  --red-strong:#dc2626;
}

body.dark { --bg:#121212; --card-bg:#1e1e1e; --text:#efefef; --var-bg:#333; }
body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); }

.header { background:var(--primary); padding:10px; }
.top { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto; }
.search { padding:8px 15px; border-radius:8px; border:none; width:250px; }

.layout { display:flex; height:calc(100vh - 60px); }

.sidebar {
  width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
  overflow-y:auto;
}

.cat {
  padding:10px 14px;
  cursor:pointer;
  border-left:4px solid transparent;
}
.cat:hover { background:#f1f5f9; }

.cat.blue { border-left-color:var(--blue-strong); }
.cat.green { border-left-color:var(--green-strong); }
.cat.purple { border-left-color:var(--purple-strong); }
.cat.pink { border-left-color:var(--pink-strong); }
.cat.red { border-left-color:var(--red-strong); }

.cat.active {
  background:var(--primary);
  color:#fff;
}

.main { flex:1; overflow-y:auto; }

/* ===== เพิ่มเฉพาะ header ===== */
.section {
  margin-bottom:40px;
}

.section-title {
  margin:10px 15px;
  font-weight:bold;
  border-bottom:1px solid #eee;
  padding-bottom:6px;
}

/* ===== GRID เดิม ===== */
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; padding:15px; max-width:1400px; margin:0 auto; }

.card {
  background:var(--card-bg);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
}

.card.blue::before { background:var(--blue-strong); }
.card.green::before { background:var(--green-strong); }
.card.purple::before { background:var(--purple-strong); }
.card.pink::before { background:var(--pink-strong); }
.card.red::before { background:var(--red-strong); }

.content { padding:12px; }

</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div style="color:white;font-weight:bold;">🔥 Zap789 PRO</div>
    <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="cats"></div>
  </div>

  <div class="main">
    <div id="grid"></div>
  </div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let currentCat="ทั้งหมด";

/* ===== COLOR ===== */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ถอน")) return "purple";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("กำลังใจ")) return "pink";
  return "blue";
}

/* ===== GROUP NAME ===== */
function getGroupName(color){
  if(color==="blue") return "💳 บัญชีและข้อมูล";
  if(color==="green") return "💰 การเงิน ฝาก-ถอน";
  if(color==="purple") return "💸 การถอนเงิน";
  if(color==="red") return "⚠️ ปัญหาและแก้ไข";
  if(color==="pink") return "💖 ทั่วไป / โปรโมท";
  return "📁 อื่นๆ";
}

async function init(){
  const res=await fetch(API_URL+"?t="+Date.now());
  DATA=await res.json();
  render();
}

/* ===== RENDER ใหม่ ===== */
function render(){
  const s = search.value.toLowerCase();

  let groups = {blue:[],green:[],purple:[],red:[],pink:[]};
  let catsSet = new Set(["ทั้งหมด"]);

  DATA.forEach((r,i)=>{
    const [cat,text,status,img]=r;
    if(status==="deleted") return;

    catsSet.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    const color=getColor(cat);

    groups[color].push(`
      <div class="card ${color}">
        <div class="content">${text}</div>
      </div>
    `);
  });

  let html="";

  Object.keys(groups).forEach(color=>{
    if(groups[color].length){
      html+=`
        <div class="section">
          <div class="section-title">${getGroupName(color)}</div>
          <div class="grid">
            ${groups[color].join("")}
          </div>
        </div>
      `;
    }
  });

  grid.innerHTML=html;

  let cHTML="";
  catsSet.forEach(c=>{
    cHTML+=`
      <div class="cat ${getColor(c)} ${c===currentCat?"active":""}"
      onclick="currentCat='${c}';render()">
      ${c}
      </div>
    `;
  });

  cats.innerHTML=cHTML;
}

init();

</script>

</body>
</html>
