<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; background:#f5f6fa; margin:0; }
.container { max-width:800px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }
button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
.copy { background:#2ecc71; color:#fff; }
.add { background:#3498db; color:#fff; }
.login { max-width:300px; margin:100px auto; }
input { width:100%; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<div id="loginBox" class="login">
  <h3>Login</h3>
  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">เข้า</button>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <h2>📋 Zap789 Tool</h2>

    <input id="cat" placeholder="หมวด">
    <input id="text" placeholder="ข้อความ">
    <button class="add" onclick="add()">+ เพิ่ม</button>

    <div id="list"></div>
  </div>
</div>

<script>

function login() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  google.script.run.withSuccessHandler(res=>{
    if(res.status=="success"){
      document.getElementById("loginBox").style.display="none";
      document.getElementById("app").style.display="block";
      load();
    }else{
      alert("รหัสผิด");
    }
  }).login(u,p);
}

function load(){
  google.script.run.withSuccessHandler(data=>{
    let html="";

    data.forEach((row,i)=>{
      const text = row[1].replace(/'/g, "\\'"); // กันพัง

      html+=`
      <div class="card">
        <b>${row[0]}</b><br>
        <div onclick="copy('${text}')">${row[1]}</div><br>
        <button class="copy" onclick="copy('${text}')">Copy</button>
      </div>`;
    });

    document.getElementById("list").innerHTML=html;
  }).getMessages();
}

function add(){
  const cat=document.getElementById("cat").value;
  const text=document.getElementById("text").value;

  if(!cat || !text){
    alert("กรอกให้ครบ");
    return;
  }

  google.script.run.withSuccessHandler(()=>{
    document.getElementById("cat").value="";
    document.getElementById("text").value="";
    load();
  }).addMessage(cat,text);
}

function copy(text){
  navigator.clipboard.writeText(text);
  alert("คัดลอกแล้ว");
}

</script>

</body>
</html>
