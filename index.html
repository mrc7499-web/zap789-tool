<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>zap789 Tool</title>

<style>
body {
  font-family: sans-serif;
  background: #fff;
  margin: 0;
}

/* LOGIN */
#loginPage {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.login-box {
  background:#fff;
  border:1px solid #eee;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}
button {
  background:#ff7a00;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* APP */
#app {
  display:none;
}

header {
  background:#ff7a00;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
}

.container {
  padding:10px;
}

.search {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:10px;
}

.card {
  background:#fff;
  border:1px solid #eee;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
}

.admin {
  color:#ff7a00;
  font-weight:bold;
}

.pin {
  float:right;
  color:red;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>🔐 Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>🔥 zap789 Team Tool</header>

  <div class="container">
    <input class="search" placeholder="🔍 ค้นหา..." oninput="searchMsg(this.value)">

    <div id="list"></div>
  </div>
</div>

<script>
const USER_SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkr3XpU1tsvsaTXvoo7gb4VmQy7QBTK6rcAc4bzh1dcqgsfHnfeb7SOHoeo-ns92IOyrIhh5z-Ejb/pub?gid=1998216884&single=true&output=csv";

let users = {};
let messages = [
  {admin:"น้องแอดมิน", text:"🙏 สวัสดีค่ะ ยินดีให้บริการค่ะ 💕"},
  {admin:"น้องฟ้า", text:"📌 สมัครแจ้งชื่อ-เบอร์-ไลน์นะคะ"},
  {admin:"น้องมิ้นท์", text:"💰 ฝากขั้นต่ำ 50 บาท"},
  {admin:"น้องแป้ง", text:"🎁 มีโปรโมชั่นตลอดนะคะ"},
];

async function loadUsers(){
  const res = await fetch(USER_SHEET);
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  rows.forEach(r=>{
    const [u,p]=r.split(",");
    if(u && p){
      users[u.trim()] = p.trim();
    }
  });
}

async function login(){
  await loadUsers();

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(users[u] && users[u]===p){
    localStorage.setItem("user", u);
    showApp();
  }else{
    alert("❌ รหัสผิด");
  }
}

function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  render(messages);
}

function render(data){
  const list = document.getElementById("list");
  list.innerHTML="";

  data.forEach(m=>{
    list.innerHTML += `
      <div class="card">
        <span class="admin">${m.admin}</span>
        <span class="pin">📌</span>
        <div>${m.text}</div>
      </div>
    `;
  });
}

function searchMsg(keyword){
  const filtered = messages.filter(m=>m.text.includes(keyword));
  render(filtered);
}

// auto login
if(localStorage.getItem("user")){
  showApp();
}
</script>

</body>
</html>
