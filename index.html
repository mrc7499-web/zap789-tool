<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.dark{background:#111;color:#eee}

.header{
  background:#ff7a00;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.search{padding:8px;border-radius:8px;border:none;width:250px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
}
.dark .card{background:#1e1e1e}

.card::before{
  content:"";
  position:absolute;
  left:0;top:0;width:6px;height:100%;
}

.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}
.orange::before{background:#f97316}

.actions{
  position:absolute;
  top:5px;
  right:5px;
  display:none;
}
.card:hover .actions{display:block}

.star{
  position:absolute;
  top:5px;
  left:5px;
}

.var{
  background:#ddd;
  padding:2px 4px;
  border-radius:4px;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div class="header">
  🔥 Zap789
  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">

  <div>
    <button onclick="toggleMode()">⚙️</button>
    <button onclick="toggleDark()">🌙</button>
  </div>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast">✅ คัดลอกแล้ว</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[], CONFIG={}, ADMINS=[];
let editMode=false;
let favorites=new Set();

/* LOAD */
fetch(`${API}?action=get`).then(r=>r.json()).then(d=>{DATA=d;render();});
fetch(`${API}?action=admins`).then(r=>r.json()).then(d=>{ADMINS=d.map(x=>x[0]);});

/* RANDOM NAME */
function randomName(){
  return ADMINS[Math.floor(Math.random()*ADMINS.length)] || "แอดมิน";
}

/* APPLY VARIABLES */
function applyVars(text){
  text=text.replaceAll("{name}",randomName());
  Object.keys(CONFIG).forEach(k=>{
    text=text.replaceAll(`{${k}}`,CONFIG[k]);
  });
  return text;
}

/* COPY */
function copy(text,i){
  navigator.clipboard.writeText(applyVars(text));
  toast();
  fetch(`${API}?action=count&row=${i}`);
}

/* TOAST */
function toast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

/* MODE */
function toggleMode(){
  editMode=!editMode;
  render();
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* COLOR */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  if(cat.includes("สมัคร")) return "blue";
  return "orange";
}

/* PIN */
function toggleFav(i){
  if(favorites.has(i)) favorites.delete(i);
  else favorites.add(i);
  render();
}

/* HIGHLIGHT */
function highlight(text){
  return text.replaceAll("{name}", `<span class="var">{name}</span>`);
}

/* SORT */
function getSorted(){
  return [...DATA.keys()].sort((a,b)=>{
    return (favorites.has(b)-favorites.has(a));
  });
}

/* RENDER */
function render(){
  let html="";
  const s=search.value.toLowerCase();

  getSorted().forEach(i=>{
    const [cat,text,status,tags,count]=DATA[i];
    if(status==="deleted") return;

    if(s && !text.toLowerCase().includes(s) && !(tags||"").includes(s)) return;

    html+=`
    <div class="card ${getColor(cat)}" onclick="copy(\`${text}\`,${i})">

      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${favorites.has(i) ? "⭐" : "☆"}
      </div>

      <b>${cat}</b><br><br>
      ${highlight(text)}

      ${editMode ? `
      <div class="actions">
        <button onclick="event.stopPropagation();edit(${i},\`${text}\`)">✏️</button>
        <button onclick="event.stopPropagation();del(${i})">🗑</button>
      </div>`:""}

    </div>`;
  });

  grid.innerHTML=html;
}

/* EDIT */
function edit(i,old){
  const t=prompt("แก้ไข",old);
  if(!t) return;
  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`).then(()=>location.reload());
}

/* DELETE */
function del(i){
  fetch(`${API}?action=delete&row=${i}`).then(()=>location.reload());
}

/* SHORTCUT ALT+1-5 */
document.addEventListener("keydown",(e)=>{
  if(e.altKey){
    let n=parseInt(e.key);
    if(n>=1 && n<=5){
      let sorted=getSorted();
      let i=sorted[n-1];
      if(i!==undefined) copy(DATA[i][1],i);
    }
  }
});
</script>

</body>
</html>
