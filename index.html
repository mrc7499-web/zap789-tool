<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body { font-family:sans-serif; margin:0; background:#f4f4f4; }
.header { background:#ff7a00; padding:10px; color:#fff; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:10px; }
.card { background:#fff; padding:10px; border-radius:10px; cursor:pointer; }
.var { color:#ff7a00; background:#eee; padding:2px 5px; border-radius:4px; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:#000; color:#fff; padding:10px 20px; border-radius:50px; opacity:0; }
</style>
</head>

<body>

<div class="header">
🔥 Zap789 PRO
<input id="search" placeholder="ค้นหา..." oninput="render()">
<button onclick="openModal()">+ เพิ่ม</button>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); align-items:center; justify-content:center;">
<div style="background:#fff; padding:20px; border-radius:10px;">
<input id="catInput" placeholder="หมวด"><br><br>
<textarea id="textInput" placeholder="ข้อความ"></textarea><br><br>
<input type="file" id="imgInput"><br><br>
<button onclick="closeModal()">ยกเลิก</button>
<button onclick="save()">บันทึก</button>
</div>
</div>

<script>
const API_URL = "ใส่ลิงก์ Apps Script ของคุณตรงนี้";

let DATA = [];
let NAMES = [];
let editIndex = null;


// ===== INIT (กันพัง) =====
async function init(){
    console.log("INIT START");

    try {
        const res = await fetch(API_URL + "?action=get");
        DATA = await res.json();
        if (!Array.isArray(DATA)) DATA = [];
    } catch(e) {
        console.log("โหลด DATA ไม่ได้", e);
        DATA = [];
    }

    try {
        const res2 = await fetch(API_URL + "?action=names");
        NAMES = await res2.json();
        if (!Array.isArray(NAMES)) NAMES = [];
    } catch(e) {
        console.log("โหลด NAMES ไม่ได้", e);
        NAMES = [];
    }

    console.log("DATA:", DATA);
    console.log("NAMES:", NAMES);

    render();
}


// ===== RANDOM NAME =====
function randomName(){
    if(!NAMES.length) return "ลูกค้า";
    return NAMES[Math.floor(Math.random()*NAMES.length)];
}


// ===== COPY TEXT =====
async function copyText(text){
    try {
        const name = randomName();
        const finalText = text.replace(/{name}/g, name);

        await navigator.clipboard.writeText(finalText);
        showToast("คัดลอกแล้ว ("+name+")");

    } catch(e){
        console.log("copy error", e);
    }
}


// ===== RENDER (กันพัง) =====
function render(){
    const grid = document.getElementById('grid');
    const s = document.getElementById('search').value.toLowerCase();

    if (!Array.isArray(DATA)) {
        grid.innerHTML = "❌ DATA ERROR";
        return;
    }

    let html = "";

    DATA.forEach((r,i)=>{
        try {
            const [cat,text,status,img] = r;

            if(status==="deleted") return;
            if(s && !text.toLowerCase().includes(s)) return;

            html += `
            <div class="card">
                ${img ? `<img src="${img}" style="width:100%">` : ""}
                <div onclick="copyText(\`${text}\`)">
                    ${text.replace(/{name}/g,'<span class="var">{name}</span>')}
                </div>
                <br>
                <button onclick="edit(${i})">แก้ไข</button>
                <button onclick="remove(${i})">ลบ</button>
            </div>`;
        } catch(e){
            console.log("render error", e, r);
        }
    });

    grid.innerHTML = html || "ไม่มีข้อมูล";
}


// ===== MODAL =====
function openModal(){
    editIndex=null;
    document.getElementById('modal').style.display="flex";
}
function closeModal(){
    document.getElementById('modal').style.display="none";
}


// ===== EDIT =====
function edit(i){
    editIndex=i;
    document.getElementById('catInput').value = DATA[i][0];
    document.getElementById('textInput').value = DATA[i][1];
    openModal();
}


// ===== DELETE =====
async function remove(i){
    try {
        await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify({action:"delete", index:i})
        });
        init();
    } catch(e){
        console.log("delete error", e);
    }
}


// ===== SAVE =====
function save(){
    const file = document.getElementById('imgInput').files[0];

    if(file){
        const reader = new FileReader();
        reader.onload = e => executeSave(e.target.result);
        reader.readAsDataURL(file);
    }else{
        executeSave(null);
    }
}


// ===== EXECUTE SAVE =====
async function executeSave(img){
    const c = document.getElementById('catInput').value;
    const t = document.getElementById('textInput').value;

    try {
        if(editIndex!==null){
            await fetch(API_URL,{
                method:"POST",
                body:JSON.stringify({
                    action:"update",
                    index:editIndex,
                    cat:c,
                    text:t,
                    image:img
                })
            });
        }else{
            await fetch(API_URL,{
                method:"POST",
                body:JSON.stringify({
                    action:"add",
                    cat:c,
                    text:t,
                    image:img
                })
            });
        }

        closeModal();
        init();

    } catch(e){
        console.log("save error", e);
    }
}


// ===== TOAST =====
function showToast(msg){
    const t=document.getElementById('toast');
    t.innerText=msg;
    t.style.opacity=1;
    setTimeout(()=>t.style.opacity=0,1000);
}


// ===== START =====
init();
</script>

</body>
</html>
