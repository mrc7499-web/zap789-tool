<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family:system-ui;
  display:flex;
  height:100vh;
  background:#f5f5f5;
}

/* SIDEBAR */
.sidebar {
  width:200px;
  background:#ff6a00;
  color:#fff;
  padding:10px;
}
.sidebar div {
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}
.sidebar div:hover {
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* TOP BAR */
.top {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
input {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* CARD */
.card {
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

/* TEXT */
.text {
  cursor:pointer;
  padding:8px;
  border-radius:6px;
}
.text:hover {
  background:#f1f1f1;
}

/* BUTTON */
.btn {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}
.add { background:#ff6a00; color:#fff; }
.copy { background:#22c55e; color:#fff; }
.del { background:#ef4444; color:#fff; }

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  color:#fff;
  padding:8px 12px;
  border-radius:6px;
  opacity:0;
  transition:.3s;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<div class="sidebar" id="menu"></div>

<div class="main">
  <div class="top">
    <input id="cat" placeholder="หมวด">
    <input id="text" placeholder="ข้อความ">
    <button class="btn add" onclick="add()">+ เพิ่ม</button>
  </div>

  <input id="search" placeholder="ค้นหา..." oninput="load()">

  <div id="list"></div>
</div>

<div id="toast" class="toast">คัดลอกแล้ว</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let user = localStorage.getItem("user") || "";
let role = localStorage.getItem("role") || "";
let currentCat = "ทั้งหมด";

/* LOGIN */
if(!user){
  const u = prompt("username");
  const p = prompt("password");

  fetch(`${API}?action=login&username=${u}&password=${p}`)
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      localStorage.setItem("user", u);
      localStorage.setItem("role", res.role);
      location.reload();
    } else {
      alert("รหัสผิด");
    }
  });
}

/* TOAST */
function toast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1000);
}

/* LOAD */
function load(){
  fetch(`${API}?action=get`)
  .then(r=>r.json())
  .then(data=>{
    let html="";
    let cats = new Set(["ทั้งหมด"]);
    const search = document.getElementById("search").value.toLowerCase();

    data.forEach((row,i)=>{
      const cat = row[0];
      const text = row[1];

      cats.add(cat);

      if(currentCat !== "ทั้งหมด" && cat !== currentCat) return;
      if(search && !text.toLowerCase().includes(search)) return;

      html+=`
      <div class="card">
        <b>${cat}</b>

        <div class="text" onclick="copyText(\`${text}\`)">
          ${text}
        </div>

        <input value="${text}" onchange="edit(${i}, this.value)">

        <button class="btn copy" onclick="copyText(\`${text}\`)">Copy</button>

        ${role==="admin" ? `<button class="btn del" onclick="del(${i})">ลบ</button>` : ""}
      </div>`;
    });

    document.getElementById("list").innerHTML = html;
    renderMenu([...cats]);
  });
}

/* MENU */
function renderMenu(cats){
  let html="";
  cats.forEach(c=>{
    html+=`<div onclick="selectCat('${c}')">${c}</div>`;
  });
  document.getElementById("menu").innerHTML = html;
}

function selectCat(c){
  currentCat = c;
  load();
}

/* COPY */
function copyText(text){
  navigator.clipboard.writeText(text);
  toast();
}

/* ADD */
function add(){
  const cat = document.getElementById("cat").value;
  const text = document.getElementById("text").value;

  fetch(API, {
    method:"POST",
    body: JSON.stringify({ cat, text, user })
  }).then(()=>load());
}

/* EDIT */
function edit(i,val){
  fetch(`${API}?action=edit&index=${i}&text=${encodeURIComponent(val)}&user=${user}`);
}

/* DELETE */
function del(i){
  if(!confirm("ลบ?")) return;
  fetch(`${API}?action=delete&index=${i}&user=${user}`)
  .then(()=>load());
}

load();
</script>

</body>
</html>
