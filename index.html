<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
:root {
  --primary: #ff7a00;
  --bg: #f4f4f4;
  --card-bg: #ffffff;
  --text: #333;
  --var-bg: #f0f0f0;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  background: var(--primary);
  padding: 10px;
  color: white;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
}

/* CATEGORY */
.categories {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  overflow-x: auto;
}

.cat {
  background: #fff;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  border: 1px solid #ddd;
}

.cat.active {
  background: #000;
  color: #fff;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: var(--card-bg);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* LEFT COLOR BAR */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 4px;
  height: 100%;
}

.green::before { background: #22c55e; }
.red::before { background: #ef4444; }
.pink::before { background: #ec4899; }
.blue::before { background: #3b82f6; }

/* STAR */
.star {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 16px;
  z-index: 5;
}

/* IMAGE */
.img-box {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 12px;
  font-size: 14px;
}

/* NAME TAG */
.var {
  background: var(--var-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: bold;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: #fff;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <b>🔥 Zap789 PRO</b>
    <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
    <button onclick="openModal()">+ เพิ่ม</button>
  </div>
  <div id="cats" class="categories"></div>
</div>

<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <input id="catInput" placeholder="หมวด">
    <textarea id="textInput" placeholder="ข้อความ"></textarea>
    <input type="file" id="imgInput">
    <button onclick="save()">บันทึก</button>
    <button onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA = [];
let currentCat = "ทั้งหมด";
let editIndex = null;

async function init() {
  const res = await fetch(API_URL + "?t=" + Date.now());
  DATA = await res.json();
  render();
}

function getColor(cat) {
  if (cat.includes("ฝาก")) return "green";
  if (cat.includes("ปัญหา")) return "red";
  if (cat.includes("ทัก")) return "pink";
  return "blue";
}

/* 🔥 RANDOM NAME */
async function copyText(text) {
  const res = await fetch(API_URL + "?action=name");
  const data = await res.json();

  const finalText = text.replace(/{name}/g, data.name);
  navigator.clipboard.writeText(finalText);
}

/* RENDER */
function render() {
  const s = search.value.toLowerCase();
  let html = "";
  let catsSet = new Set(["ทั้งหมด"]);

  DATA.forEach((r,i)=>{
    const [cat,text,status,img] = r;
    if(status==="deleted") return;

    catsSet.add(cat);
    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    html += `
    <div class="card ${getColor(cat)}">
      <div class="star">⭐</div>
      ${img ? `<img src="${img}" class="img-box">` : ""}
      <div class="content" onclick="copyText(\`${text}\`)">
        ${text.replace(/{name}/g,'<span class="var">{name}</span>')}
      </div>
    </div>`;
  });

  grid.innerHTML = html;

  let cHTML = "";
  catsSet.forEach(c=>{
    cHTML += `<div class="cat ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</div>`;
  });

  cats.innerHTML = cHTML;
}

/* MODAL */
function openModal(){
  editIndex=null;
  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

function save(){
  const file = imgInput.files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = e => executeSave(e.target.result);
    reader.readAsDataURL(file);
  }else{
    executeSave(null);
  }
}

async function executeSave(img){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      cat:catInput.value,
      text:textInput.value,
      image:img
    })
  });

  closeModal();
  init();
}

init();

</script>

</body>
</html>
