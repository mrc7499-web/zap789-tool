<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 Dashboard</title>

<style>
body { margin:0; font-family:sans-serif; background:#f5f6fa; }

/* HEADER */
.header {
  background:#ff7a00;
  color:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.search {
  width:300px;
  padding:8px;
  border-radius:8px;
  border:none;
}

.toggle {
  background:#fff;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
}

/* CATEGORY */
.categories {
  padding:10px;
  display:flex;
  gap:10px;
  overflow:auto;
}

.cat-btn {
  background:#fff;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat-btn.active {
  background:#ff7a00;
  color:#fff;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap:12px;
  padding:15px;
}

/* CARD */
.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  transition:.2s;
}

.card:hover { transform:scale(1.02); }

/* COLOR BAR */
.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  border-radius:12px 0 0 12px;
}

/* COLORS */
.green::before { background:#22c55e; }
.red::before { background:#ef4444; }
.pink::before { background:#ec4899; }
.blue::before { background:#3b82f6; }
.orange::before { background:#f97316; }

/* EDIT MODE */
.actions {
  margin-top:10px;
}

.actions button {
  margin-right:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>🔥 Zap789 PRO</div>

  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">

  <div class="toggle" onclick="toggleMode()">
    ⚙️ <span id="modeText">โหมดตอบแชท</span>
  </div>
</div>

<div id="categories" class="categories"></div>

<div id="grid" class="grid"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let ADMINS=[];
let currentCat="ทั้งหมด";
let editMode=false;

/* LOAD */
fetch(`${API}?action=get`)
.then(r=>r.json())
.then(d=>{
  DATA=d;
  render();
});

fetch(`${API}?action=admins`)
.then(r=>r.json())
.then(d=>{
  ADMINS=d.map(x=>x[0]);
});

/* RANDOM NAME */
function randomName(){
  return ADMINS[Math.floor(Math.random()*ADMINS.length)] || "แอดมิน";
}

/* COPY */
function copy(text){
  const final=text.replaceAll("{name}",randomName());
  navigator.clipboard.writeText(final);
}

/* MODE */
function toggleMode(){
  editMode=!editMode;
  modeText.innerText = editMode ? "โหมดแก้ไข" : "โหมดตอบแชท";
  render();
}

/* COLOR BY CAT */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  if(cat.includes("สมัคร")) return "blue";
  return "orange";
}

/* RENDER */
function render(){
  let html="";
  let cats=new Set(["ทั้งหมด"]);
  const s=search.value.toLowerCase();

  DATA.forEach((r,i)=>{
    const [cat,text,status]=r;

    if(status==="deleted") return;

    cats.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card ${getColor(cat)}" onclick="copy(\`${text}\`)">
      <b>${cat}</b><br><br>
      ${text}

      ${editMode ? `
      <div class="actions">
        <button onclick="event.stopPropagation(); edit(${i},\`${text}\`)">✏️</button>
        <button onclick="event.stopPropagation(); del(${i})">🗑</button>
      </div>
      `:""}
    </div>`;
  });

  grid.innerHTML=html;

  let cHTML="";
  cats.forEach(c=>{
    cHTML+=`<div class="cat-btn ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</div>`;
  });
  categories.innerHTML=cHTML;
}

/* EDIT */
function edit(i,old){
  const t=prompt("แก้ไข",old);
  if(!t) return;

  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`)
  .then(()=>location.reload());
}

/* DELETE */
function del(i){
  fetch(`${API}?action=delete&row=${i}`)
  .then(()=>location.reload());
}
</script>

</body>
</html>
