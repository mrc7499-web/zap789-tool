<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🔥 Zap789 Admin Tool</title>

<style>
body {
  margin:0;
  font-family: sans-serif;
  background:#f5f6fa;
}

header {
  background:#ff7a00;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container {
  display:flex;
}

/* sidebar */
.sidebar {
  width:220px;
  background:#fff;
  padding:10px;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#eee;
  cursor:pointer;
}

.sidebar button.active {
  background:#ff7a00;
  color:#fff;
}

/* main */
.main {
  flex:1;
  padding:20px;
}

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input, select {
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button.add {
  background:#ff7a00;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* card */
.card {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions button {
  margin-left:5px;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

.copy { background:#2ecc71; color:#fff; }
.edit { background:#3498db; color:#fff; }
.delete { background:#e74c3c; color:#fff; }

/* toast */
#toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#333;
  color:#fff;
  padding:10px 15px;
  border-radius:8px;
  opacity:0;
  transition:0.3s;
}
#toast.show { opacity:1; }
</style>
</head>

<body>

<header>🔥 Zap789 Admin Tool</header>

<div class="container">

<div class="sidebar" id="categories"></div>

<div class="main">

<div class="topbar">
<input id="search" placeholder="ค้นหา..." oninput="render()">
<input id="newText" placeholder="ข้อความใหม่">
<select id="newCat"></select>
<button class="add" onclick="addItem()">+ เพิ่ม</button>
</div>

<div id="list"></div>

</div>
</div>

<div id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let data = [];
let currentCat = "ทั้งหมด";

const names = ["น้องแอดมิน","น้องฟ้า","น้องมิ้น","น้องแป้ง"];

function getRandomName(){
  return names[Math.floor(Math.random()*names.length)];
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* โหลดข้อมูล */
async function loadData(){
  const res = await fetch(API);
  const json = await res.json();

  data = json.slice(1).map(r => ({
    cat: r[0],
    text: r[1]
  }));

  render();
  renderCategories();
}

/* แสดงหมวด */
function renderCategories(){
  const cats = ["ทั้งหมด", ...new Set(data.map(i=>i.cat))];
  const box = document.getElementById("categories");

  box.innerHTML = cats.map(c=>{
    const count = data.filter(i=>i.cat===c).length;
    return `<button onclick="selectCat('${c}')" class="${c===currentCat?'active':''}">
      ${c} (${count})
    </button>`;
  }).join("");

  const select = document.getElementById("newCat");
  select.innerHTML = cats.filter(c=>c!=="ทั้งหมด").map(c=>`<option>${c}</option>`).join("");
}

function selectCat(c){
  currentCat = c;
  render();
  renderCategories();
}

/* render list */
function render(){
  const q = document.getElementById("search").value.toLowerCase();

  let list = data.filter(i =>
    (currentCat==="ทั้งหมด" || i.cat===currentCat) &&
    i.text.toLowerCase().includes(q)
  );

  const el = document.getElementById("list");

  el.innerHTML = list.map((i,idx)=>`
    <div class="card">
      <div>${i.text}</div>
      <div class="actions">
        <button class="copy" onclick="copyText('${i.text}')">📋</button>
        <button class="edit" onclick="editItem(${idx})">✏️</button>
        <button class="delete" onclick="deleteItem(${idx})">🗑</button>
      </div>
    </div>
  `).join("");
}

/* copy */
function copyText(t){
  const final = t.replace("{name}", getRandomName());
  navigator.clipboard.writeText(final);
  showToast("คัดลอกแล้ว ✅");
}

/* เพิ่ม */
async function addItem(){
  const text = document.getElementById("newText").value;
  const cat = document.getElementById("newCat").value;

  if(!text) return;

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({ id: cat, text: text, type:"", role:"" })
  });

  showToast("เพิ่มแล้ว");
  loadData();
}

/* ลบ */
function deleteItem(index){
  data.splice(index,1);
  render();
  showToast("ลบแล้ว (refresh จะหายถาวร)");
}

/* แก้ไข */
function editItem(index){
  const newText = prompt("แก้ข้อความ:", data[index].text);
  if(newText){
    data[index].text = newText;
    render();
    showToast("แก้ไขแล้ว");
  }
}

loadData();
</script>

</body>
</html>
