<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO | Perfect Edition</title>

<style>
:root {
  --primary:#ff7a00;
  --bg:#f4f4f4;
  --card-bg:#ffffff;
  --text:#333;
  --var-bg:#eee;

  --blue-soft:#e0f2fe;
  --blue-strong:#0284c7;
  --green-soft:#dcfce7;
  --green-strong:#16a34a;
  --purple-soft:#ede9fe;
  --purple-strong:#6d28d9;
  --pink-soft:#fce7f3;
  --pink-strong:#db2777;
  --red-soft:#fee2e2;
  --red-strong:#dc2626;
}

body.dark { --bg:#121212; --card-bg:#1e1e1e; --text:#efefef; --var-bg:#333; }
body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
.header { background:var(--primary); padding:10px; }
.top { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto; }
.search { padding:8px 15px; border-radius:8px; border:none; width:250px; }

/* LAYOUT */
.layout { display:flex; height:calc(100vh - 60px); }

.sidebar {
  width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
  overflow-y:auto;
}

/* SIDEBAR BUTTONS */
.cat {
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  border-left:4px solid transparent;
  margin-bottom: 5px;
  font-weight: 500;
}
.cat:hover { background:#f1f5f9; }

.cat.blue { border-left-color:var(--blue-strong); }
.cat.green { border-left-color:var(--green-strong); }
.cat.purple { border-left-color:var(--purple-strong); }
.cat.pink { border-left-color:var(--pink-strong); }
.cat.red { border-left-color:var(--red-strong); }

.cat.active {
  background:var(--primary);
  color:#fff;
  border-left-color:var(--primary);
}

/* MAIN CONTENT */
.main { flex:1; overflow-y:auto; }

/* ===== GROUPING & GRID (เลย์เอาต์ใหม่) ===== */
.main-container { 
  padding: 15px; 
  max-width: 1400px; 
  margin: 0 auto; 
}

.group-section {
  margin-bottom: 40px; 
}

.group-header {
  font-size: 18px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 15px;
  padding-bottom: 8px;
  border-bottom: 2px solid #ddd;
  display: inline-block;
  min-width: 250px;
}

body.dark .group-header { border-bottom-color: #444; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

/* Responsive */
@media (max-width: 1200px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .card-grid { grid-template-columns: repeat(1, 1fr); } }

/* CARD */
.card {
  background:var(--card-bg);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.15s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.card:active { transform:scale(0.96); opacity:0.85; }

.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
}

/* สีแถบข้างการ์ด */
.card.blue::before { background:var(--blue-strong); }
.card.green::before { background:var(--green-strong); }
.card.purple::before { background:var(--purple-strong); }
.card.pink::before { background:var(--pink-strong); }
.card.red::before { background:var(--red-strong); }

.actions {
  position:absolute;
  top:8px;
  left:12px;
  display:none;
  gap:5px;
  z-index:10;
}
.card:hover .actions { display:flex; }

.btn-action {
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:4px 8px;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
}

.img-box {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.content {
  padding:12px;
  font-size:14px;
  line-height: 1.5;
}

.var {
  background:var(--var-bg);
  padding:2px 5px;
  border-radius:4px;
  font-weight:bold;
  color: var(--primary);
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:50px;
  opacity:0;
  transition:.3s;
  z-index: 100;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 1000;
}

.modal-box {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:350px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.input-ui {
  padding:10px;
  border-radius:6px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div style="font-weight:bold;color:white;font-size:18px;">🔥 Zap789 PRO</div>
    <input id="search" class="search" placeholder="ค้นหาข้อความ..." oninput="render()">
    <div>
      <button onclick="openModal()" style="padding:8px 15px; border-radius:6px; border:none; cursor:pointer;">+ เพิ่มข้อมูล</button>
      <button onclick="toggleDark()" style="padding:8px; border-radius:6px; border:none; cursor:pointer; margin-left:5px;">🌙</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="cats"></div>
  </div>

  <div class="main">
    <div id="grid" class="main-container"></div>
  </div>
</div>

<div id="toast" class="toast">✅ คัดลอกสำเร็จ</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <input id="catInput" class="input-ui" placeholder="ระบุหมวดหมู่ (เช่น สมัคร, ฝากเงิน)">
    <textarea id="textInput" class="input-ui" rows="4" placeholder="พิมพ์ข้อความ... ใส่ {name} ตรงจุดที่ต้องการแทนชื่อ"></textarea>
    <input type="file" id="imgInput" accept="image/*">
    <button onclick="save()" style="padding:10px; background:var(--primary); color:#fff; border:none; border-radius:6px; cursor:pointer;">บันทึก</button>
    <button onclick="closeModal()" style="padding:10px; background:#ddd; border:none; border-radius:6px; cursor:pointer;">ยกเลิก</button>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let currentCat="ทั้งหมด";
let editIndex=null;

/* ===== FIXED COLOR MAP (แมปสีหมวดหมู่ให้เป๊ะ) ===== */
const COLOR_MAP = {
  "ทั้งหมด":"blue",
  "สมัคร":"blue",
  "ขอข้อมูล / เปลี่ยนรหัส":"blue",
  "เปลี่ยนบัญชี":"blue",
  "ปิดแชท":"blue",
  "ทางเข้า":"blue",
  "ค้างเดิมพัน / เครดิต":"blue",

  "ฝากเงิน":"green",
  "QR Code":"green",

  "ถอนเงิน":"purple",

  "เครดิตฟรี / โปร":"pink",
  "เกม / แนะนำ":"pink",
  "กำลังใจ (เต็ม)":"pink",
  "ทักหลายไลน์":"pink",

  "ฝากปัญหา":"red",
  "บัญชีไม่ตรง":"red",
  "ถอนปัญหา":"red",
  "เข้าเล่นไม่ได้":"red",
  "VPN / เน็ต":"red",
  "ลูกค้าด่า":"red"
};

/* COLOR FUNCTION */
function getColor(cat){
  if(COLOR_MAP[cat]) return COLOR_MAP[cat];

  for(const key in COLOR_MAP){
    if(cat.includes(key)){
      return COLOR_MAP[key];
    }
  }
  return "blue";
}

function getCatStyle(cat){
  return getColor(cat);
}

/* INIT */
async function init(){
  try {
    const res=await fetch(API_URL+"?t="+Date.now());
    DATA=await res.json();
    render();
  } catch (error) {
    console.error("Error loading data:", error);
  }
}

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1200);
}

/* COPY TEXT */
async function copyText(text){
  try {
    await navigator.clipboard.writeText(text);
    showToast("✅ คัดลอกข้อความสำเร็จ");
  } catch (err) {
    console.error('Failed to copy: ', err);
  }
}

/* COPY IMAGE */
async function copyImage(url){
  try {
    const res=await fetch(url);
    const blob=await res.blob();
    await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
    showToast("✅ คัดลอกรูปภาพสำเร็จ");
  } catch (err) {
    console.error('Failed to copy image: ', err);
    showToast("❌ ไม่สามารถคัดลอกรูปภาพได้");
  }
}

/* ===== RENDER FUNCTION (จัดกลุ่ม + Grid + ฟังก์ชันครบ) ===== */
function render(){
  const s=search.value.toLowerCase();
  let catsSet=new Set(["ทั้งหมด"]);

  // 1. เตรียมกล่องรองรับการ์ดแต่ละหมวดหมู่สี พร้อมตั้งชื่อหัวข้อ
  const groups = {
    blue: { title: "💳 บัญชี ข้อมูล และ ทางเข้า", cards: [] },
    green: { title: "💰 การเงิน ฝากเงิน", cards: [] },
    purple: { title: "🔄 การถอนเงิน", cards: [] },
    pink: { title: "💖 ทั่วไป โปรโมท และ กำลังใจ", cards: [] },
    red: { title: "⚠️ ปัญหาขัดข้อง และ ลูกค้าคอมเพลน", cards: [] }
  };

  // 2. วนลูปข้อมูลและสร้างการ์ด
  DATA.forEach((r,i)=>{
    const [cat,text,status,img]=r;
    if(status==="deleted") return;

    catsSet.add(cat);
    
    // กรองข้อมูลตามหมวดและคำค้นหา
    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    const color = getColor(cat);

    // 3. สร้าง HTML ของตัวการ์ด พร้อมฟังก์ชัน
    const cardHTML = `
    <div class="card ${color}" onclick="copyText(\`${text}\`)">
      <div class="actions">
        <div class="btn-action" onclick="event.stopPropagation();edit(${i})">✏️ แก้ไข</div>
        <div class="btn-action" onclick="event.stopPropagation();removeItem(${i})">🗑️ ลบ</div>
      </div>
      ${img ? `<img src="${img}" class="img-box" onclick="event.stopPropagation();copyImage('${img}')">` : ""}
      <div class="content">
        ${text.replace(/{name}/g,'<span class="var">{name}</span>')}
      </div>
    </div>`;

    // ยัดการ์ดลงกล่องสีให้ถูกหมวด
    if(groups[color]) {
      groups[color].cards.push(cardHTML);
    }
  });

  // 4. นำกล่องที่มีการ์ดมาต่อกันเป็น HTML ของหน้าเว็บ
  let html="";
  Object.keys(groups).forEach(key => {
    const g = groups[key];
    if(g.cards.length > 0) { 
      html += `
      <div class="group-section">
        <div class="group-header">${g.title}</div>
        <div class="card-grid">
          ${g.cards.join("")}
        </div>
      </div>
      `;
    }
  });

  if(html==="") html="<div style='text-align:center; padding:50px; color:#888; font-size:16px;'>ไม่พบข้อความที่ค้นหา</div>";
  document.getElementById("grid").innerHTML=html;

  // 5. เรนเดอร์ปุ่ม Sidebar
  let cHTML="";
  catsSet.forEach(c=>{
    cHTML+=`
      <div class="cat ${getCatStyle(c)} ${c===currentCat?"active":""}" 
      onclick="currentCat='${c}';render()">
      ${c}
      </div>
    `;
  });
  document.getElementById("cats").innerHTML=cHTML;
}

/* MODAL FUNCTIONS */
function openModal(){ 
  editIndex=null; 
  document.getElementById('catInput').value = currentCat !== "ทั้งหมด" ? currentCat : "";
  document.getElementById('textInput').value = "";
  document.getElementById('imgInput').value = "";
  document.getElementById('modal').style.display="flex"; 
}

function closeModal(){ 
  document.getElementById('modal').style.display="none"; 
}

function edit(i){
  editIndex=i;
  document.getElementById('catInput').value=DATA[i][0];
  document.getElementById('textInput').value=DATA[i][1];
  document.getElementById('modal').style.display="flex";
}

async function removeItem(i){
  if(confirm("คุณแน่ใจหรือไม่ว่าต้องการลบข้อความนี้?")){
    await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({action:"delete",index:i})
    });
    init();
  }
}

function save(){
  const imgInput = document.getElementById('imgInput');
  const file=imgInput.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=e=>executeSave(e.target.result);
    reader.readAsDataURL(file);
  }else{
    executeSave(null);
  }
}

async function executeSave(img){
  // กรณีแก้ไข รูปเดิมจะถูกบันทึกทับ ถ้าไม่อัปใหม่ ควรเก็บของเก่าไว้
  // ในที่นี้ทำตาม Logic เดิมของคุณคือส่ง img = null ถ้าไม่ได้อัปใหม่
  const catVal = document.getElementById('catInput').value;
  const textVal = document.getElementById('textInput').value;
  
  if(!catVal || !textVal) {
    alert("กรุณาระบุหมวดหมู่และข้อความให้ครบถ้วน");
    return;
  }

  document.getElementById('modal').style.display="none"; // ปิดก่อนกันกดเบิ้ล
  showToast("กำลังบันทึกข้อมูล...");

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:editIndex!==null?"edit":"add",
      index:editIndex,
      cat:catVal,
      text:textVal,
      image:img
    })
  });

  init();
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

init();
</script>

</body>
</html>
