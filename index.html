<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial; background:#f5f6fa; margin:0; }
.container { max-width:800px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }
button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
.copy { background:#2ecc71; color:#fff; }
.add { background:#3498db; color:#fff; }
.login { max-width:300px; margin:100px auto; }
input { width:100%; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<div id="loginBox" class="login">
  <h3>Login</h3>
  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <button onclick="login()">เข้า</button>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <h2>📋 Zap789 Tool</h2>

    <input id="cat" placeholder="หมวด">
    <input id="text" placeholder="ข้อความ">
    <button class="add" onclick="add()">+ เพิ่ม</button>

    <div id="list"></div>
  </div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

// 🔐 LOGIN
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  fetch(`${API}?action=login&username=${u}&password=${p}`)
    .then(res=>res.json())
    .then(data=>{
      if(data.status==="success"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        load();
      }else{
        alert("รหัสผิด");
      }
    });
}

// 📥 LOAD
function load(){
  fetch(`${API}?action=get`)
    .then(res=>res.json())
    .then(data=>{
      let html="";

      data.forEach(row=>{
        html+=`
        <div class="card">
          <b>${row[0]}</b><br>
          <div onclick="copyText(\`${row[1]}\`)">${row[1]}</div><br>
          <button class="copy" onclick="copyText(\`${row[1]}\`)">Copy</button>
        </div>`;
      });

      document.getElementById("list").innerHTML=html;
    });
}

// ➕ ADD
function add(){
  const cat=document.getElementById("cat").value;
  const text=document.getElementById("text").value;

  fetch(`${API}?action=add&cat=${cat}&text=${encodeURIComponent(text)}`)
    .then(()=>load());
}

// 📋 COPY
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("คัดลอกแล้ว");
}

</script>

</body>
</html>
