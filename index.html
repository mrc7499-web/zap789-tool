<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 Dashboard</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
}
.dark{background:#111;color:#eee}

/* HEADER */
.header{
  background:#ff7a00;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.search{
  padding:8px;
  border-radius:8px;
  border:none;
  width:260px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  line-height:1.5;
  font-size:14px;
  transition:.15s;
}
.dark .card{background:#1e1e1e}

.card:hover{transform:scale(1.02)}

/* COLOR BAR */
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  border-radius:12px 0 0 12px;
}

.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}
.orange::before{background:#f97316}

/* ACTION */
.actions{
  position:absolute;
  top:6px;
  right:6px;
  display:none;
}
.card:hover .actions{display:block}

/* STAR */
.star{
  position:absolute;
  top:6px;
  left:6px;
  font-size:14px;
}

/* VARIABLE */
.var{
  background:#eee;
  color:#333;
  padding:2px 6px;
  border-radius:6px;
}
.dark .var{
  background:#333;
  color:#fff;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px 14px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div class="header">
  🔥 Zap789
  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">

  <div>
    <button onclick="toggleMode()">⚙️</button>
    <button onclick="toggleDark()">🌙</button>
  </div>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast">✅ คัดลอกแล้ว</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let ADMINS=[];
let favorites=new Set();
let editMode=false;

/* LOAD */
async function init(){
  try{
    const d = await fetch(`${API}?action=get`).then(r=>r.json());
    DATA = d;

    const a = await fetch(`${API}?action=admins`).then(r=>r.json());
    ADMINS = a.map(x=>x[0]);

    render();
  }catch(e){
    console.error(e);
    alert("โหลดข้อมูลไม่สำเร็จ");
  }
}
init();

/* RANDOM NAME */
function randomName(){
  if(ADMINS.length===0) return "แอดมิน";
  return ADMINS[Math.floor(Math.random()*ADMINS.length)];
}

/* APPLY VARIABLE */
function applyVars(text){
  return text.replaceAll("{name}", randomName());
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(applyVars(text));
  showToast();
}

/* TOAST */
function showToast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1200);
}

/* MODE */
function toggleMode(){
  editMode=!editMode;
  render();
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* COLOR */
function getColor(cat){
  if(!cat) return "orange";
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  if(cat.includes("สมัคร")) return "blue";
  return "orange";
}

/* PIN */
function toggleFav(i){
  if(favorites.has(i)) favorites.delete(i);
  else favorites.add(i);
  render();
}

/* HIGHLIGHT */
function highlight(text){
  return text.replaceAll("{name}", `<span class="var">{name}</span>`);
}

/* SORT */
function sortedIndex(){
  return [...DATA.keys()].sort((a,b)=>{
    return (favorites.has(b)-favorites.has(a));
  });
}

/* RENDER */
function render(){
  const grid=document.getElementById("grid");
  const searchText=(document.getElementById("search").value||"").toLowerCase();

  let html="";

  sortedIndex().forEach(i=>{
    const row = DATA[i];
    if(!row) return;

    const cat=row[0]||"";
    const text=row[1]||"";
    const status=row[2]||"";

    if(status==="deleted") return;

    if(searchText && !text.toLowerCase().includes(searchText)) return;

    html+=`
    <div class="card ${getColor(cat)}" onclick="copy(\`${text}\`)">

      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${favorites.has(i) ? "⭐" : "☆"}
      </div>

      ${highlight(text)}

      ${editMode ? `
      <div class="actions">
        <button onclick="event.stopPropagation();edit(${i},\`${text}\`)">✏️</button>
        <button onclick="event.stopPropagation();del(${i})">🗑</button>
      </div>`:""}

    </div>`;
  });

  grid.innerHTML=html;
}

/* EDIT */
function edit(i,old){
  const t=prompt("แก้ไขข้อความ",old);
  if(!t) return;

  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`)
  .then(()=>init());
}

/* DELETE */
function del(i){
  if(!confirm("ลบ?")) return;

  fetch(`${API}?action=delete&row=${i}`)
  .then(()=>init());
}
</script>

</body>
</html>
