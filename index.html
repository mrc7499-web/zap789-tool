<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:16px;
}

/* CARD */
.card{
  background:#fff;
  padding:12px;
  border-radius:10px;
  position:relative;
}

/* IMAGE */
.img-box{
  position:relative;
  margin-bottom:8px;
}

.img-box img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}

/* IMAGE TOOLS */
.img-tools{
  position:absolute;
  top:5px;
  right:5px;
  display:none;
}

.img-box:hover .img-tools{
  display:block;
}

.img-tools button{
  margin-left:4px;
}

/* TEXT */
.text{
  cursor:pointer;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  opacity:0;
}
</style>
</head>

<body>

<input id="search" placeholder="ค้นหา..." oninput="render()">

<div id="grid" class="grid"></div>

<div id="toast" class="toast"></div>

<script>
const API="YOUR_API_HERE";

let DATA=[];

/* LOAD */
async function init(){
  DATA=await fetch(`${API}?action=get`).then(r=>r.json());
  render();
}
init();

/* COPY TEXT */
function copyText(text){
  navigator.clipboard.writeText(text);
  showToast("✅ คัดลอกข้อความแล้ว");
}

/* COPY IMAGE */
async function copyImage(url){
  const res=await fetch(url);
  const blob=await res.blob();

  await navigator.clipboard.write([
    new ClipboardItem({[blob.type]: blob})
  ]);

  showToast("✅ คัดลอกรูปภาพแล้ว");
}

/* DOWNLOAD */
function downloadImage(url){
  const a=document.createElement("a");
  a.href=url;
  a.download="image";
  a.click();
}

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

/* RENDER */
function render(){
  let html="";
  const s=(search.value||"").toLowerCase();

  DATA.forEach((r,i)=>{
    const [cat,text,status,image]=r;
    if(status==="deleted") return;
    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card">

      ${image ? `
      <div class="img-box">

        <img src="${image}" onclick="copyImage('${image}')">

        <div class="img-tools">
          <button onclick="event.stopPropagation();copyImage('${image}')">📋</button>
          <button onclick="event.stopPropagation();downloadImage('${image}')">⬇️</button>
        </div>

      </div>
      `:""}

      <div class="text" onclick="copyText(\`${text}\`)">
        ${text}
      </div>

    </div>`;
  });

  grid.innerHTML=html;
}
</script>

</body>
</html>
