<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO | Perfect Edition</title>

<style>
:root {
  --primary:#ff7a00;
  --bg:#f4f4f4;
  --card-bg:#ffffff;
  --text:#333;
  --var-bg:#eee;

  --blue-strong:#0284c7;
  --green-strong:#16a34a;
  --purple-strong:#6d28d9;
  --pink-strong:#db2777;
  --red-strong:#dc2626;
}

body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
.header { background:var(--primary); padding:10px; }
.top { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto; }
.search { padding:8px 15px; border-radius:8px; border:none; width:250px; }

/* LAYOUT */
.layout { display:flex; height:calc(100vh - 60px); }

/* SIDEBAR */
.sidebar {
  width:260px;
  min-width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
  overflow-y:auto;
}

.cat {
  padding:10px;
  cursor:pointer;
  border-left:4px solid transparent;
}
.cat:hover { background:#f1f5f9; }

.cat.blue { border-left-color:var(--blue-strong); }
.cat.green { border-left-color:var(--green-strong); }
.cat.purple { border-left-color:var(--purple-strong); }
.cat.pink { border-left-color:var(--pink-strong); }
.cat.red { border-left-color:var(--red-strong); }

.cat.active {
  background:var(--primary);
  color:#fff;
}

/* MAIN */
.main {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* SECTION */
.section {
  margin-bottom:40px;
}

.section-title {
  font-weight:bold;
  margin-bottom:10px;
}

/* GRID FIX */
.section-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
  gap:15px;
}

/* CARD (ของเดิม) */
.card {
  background:var(--card-bg);
  border-radius:10px;
  position:relative;
  cursor:pointer;
}

.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
}

.card.blue::before { background:var(--blue-strong); }
.card.green::before { background:var(--green-strong); }
.card.purple::before { background:var(--purple-strong); }
.card.pink::before { background:var(--pink-strong); }
.card.red::before { background:var(--red-strong); }

.content { padding:12px; }
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div style="color:white;font-weight:bold;">🔥 Zap789 PRO</div>
    <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="cats"></div>
  </div>

  <div class="main">
    <div id="grid"></div>
  </div>
</div>

<script>

/* ===== COLOR ===== */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ถอน")) return "purple";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("กำลังใจ")) return "pink";
  return "blue";
}

function getGroupName(color){
  if(color==="blue") return "💳 บัญชี";
  if(color==="green") return "💰 ฝาก";
  if(color==="purple") return "💸 ถอน";
  if(color==="red") return "⚠️ ปัญหา";
  if(color==="pink") return "💖 ทั่วไป";
  return "";
}

/* MOCK DATA (ของจริงคุณใช้ DATA เดิมได้เลย) */
let DATA=[
  ["สมัคร","ข้อความ1"],
  ["ฝากเงิน","ข้อความ2"],
  ["ถอนเงิน","ข้อความ3"],
  ["ปัญหา","ข้อความ4"],
  ["กำลังใจ","ข้อความ5"]
];

let currentCat="ทั้งหมด";

/* ===== RENDER ===== */
function render(){

  let groups={blue:[],green:[],purple:[],red:[],pink:[]};
  let catsSet=new Set(["ทั้งหมด"]);

  DATA.forEach((r,i)=>{
    const [cat,text]=r;
    catsSet.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;

    const color=getColor(cat);

    groups[color].push(`
      <div class="card ${color}">
        <div class="content">${text}</div>
      </div>
    `);
  });

  /* GROUP */
  let html="";
  Object.keys(groups).forEach(color=>{
    if(groups[color].length){
      html+=`
        <div class="section">
          <div class="section-title">${getGroupName(color)}</div>
          <div class="section-grid">
            ${groups[color].join("")}
          </div>
        </div>
      `;
    }
  });

  grid.innerHTML=html;

  /* SIDEBAR */
  let cHTML="";
  catsSet.forEach(c=>{
    cHTML+=`
      <div class="cat ${getColor(c)} ${c===currentCat?"active":""}"
      onclick="currentCat='${c}';render()">
      ${c}
      </div>
    `;
  });

  cats.innerHTML=cHTML;
}

render();

</script>

</body>
</html>
