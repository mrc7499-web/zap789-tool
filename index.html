<script>
const API_URL = "PUT_YOUR_WEBAPP_URL_HERE";

let DATA = [];
let currentCat = "ทั้งหมด";
let editIndex = null;

// โหลดข้อมูล
async function init() {
    try {
        const res = await fetch(API_URL + "?action=get");
        DATA = await res.json();
        render();
    } catch(e) {
        console.log("Fetch Error");
    }
}

// 🎲 copy + สุ่มชื่อ + log
async function copyText(text, cat) {
    try {
        // 1. สุ่มชื่อ
        const res = await fetch(API_URL + "?action=randomName");
        const data = await res.json();
        const name = data.name;

        // 2. แทน {name}
        const finalText = text.replace(/{name}/g, name);

        // 3. copy
        await navigator.clipboard.writeText(finalText);

        // 4. log
        fetch(API_URL + `?action=log&name=${encodeURIComponent(name)}&text=${encodeURIComponent(text)}&cat=${encodeURIComponent(cat)}`);

        showToast("✅ คัดลอก: " + name);
    } catch(e) {
        showToast("❌ error");
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 1200);
}

// 🎨 render
function render() {
    const s = document.getElementById('search').value.toLowerCase();
    let html = "";
    let catsSet = new Set(["ทั้งหมด"]);

    DATA.forEach((r, i) => {
        const [cat, text, status, img] = r;
        if (status === "deleted") return;

        catsSet.add(cat);

        if (currentCat !== "ทั้งหมด" && cat !== currentCat) return;
        if (s && !text.toLowerCase().includes(s)) return;

        html += `
        <div class="card ${getColor(cat)}">
            <div class="content" onclick="copyText(\`${text}\`, \`${cat}\`)">
                ${text.replace(/{name}/g, '<span class="var">{name}</span>')}
            </div>
        </div>`;
    });

    document.getElementById('grid').innerHTML = html;

    let cHTML = "";
    catsSet.forEach(c => {
        cHTML += `<div class="cat ${c === currentCat ? "active" : ""}" onclick="currentCat='${c}'; render()">${c}</div>`;
    });

    document.getElementById('cats').innerHTML = cHTML;
}

// สี
function getColor(cat) {
    if (cat.includes("ฝาก") || cat.includes("ถอน")) return "green";
    if (cat.includes("ปัญหา")) return "red";
    if (cat.includes("ทัก")) return "pink";
    return "blue";
}

init();
</script>
