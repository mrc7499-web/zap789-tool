<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body { margin:0; font-family:sans-serif; background:#f4f4f4; }
.header { background:#ff7a00; padding:10px; color:white; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:10px; }
.card { background:#fff; padding:10px; border-radius:8px; cursor:pointer; }
.img-box { width:100%; aspect-ratio:1/1; object-fit:cover; }
button { margin-top:5px; }
</style>
</head>

<body>

<div class="header">
  🔥 Zap789 PRO
  <button onclick="openModal()">+ เพิ่ม</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);">
  <div style="background:#fff; padding:20px; width:300px; margin:100px auto;">
    <input id="catInput" placeholder="หมวด"><br><br>
    <textarea id="textInput" placeholder="ข้อความ"></textarea><br><br>
    <input type="file" id="imgInput"><br><br>
    <button onclick="save()">บันทึก</button>
    <button onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA = [];
let editIndex = null;

async function init() {
  const res = await fetch(API_URL + "?t=" + Date.now());
  DATA = await res.json();
  render();
}

function render() {
  let html = "";
  DATA.forEach((r, i) => {
    if (r[2] === "deleted") return;

    html += `
    <div class="card">
      ${r[3] ? `<img src="${r[3]}" class="img-box">` : ""}
      <div onclick="copyText(\`${r[1]}\`)">${r[1]}</div>
      <button onclick="edit(${i})">✏️</button>
      <button onclick="removeItem(${i})">🗑️</button>
    </div>`;
  });

  document.getElementById("grid").innerHTML = html;
}

async function copyText(text) {

  // 🔥 ดึงชื่อจาก Apps Script
  const res = await fetch(API_URL + "?action=name");
  const data = await res.json();

  const finalText = text.replace(/{name}/g, data.name);

  await navigator.clipboard.writeText(finalText);

  alert("คัดลอกแล้ว: " + data.name);
}

function openModal(){
  editIndex = null;
  catInput.value = "";
  textInput.value = "";
  modal.style.display = "block";
}

function closeModal(){
  modal.style.display = "none";
}

function edit(i){
  editIndex = i;
  catInput.value = DATA[i][0];
  textInput.value = DATA[i][1];
  modal.style.display = "block";
}

async function removeItem(i){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({action:"delete", index:i})
  });
  init();
}

function save(){
  const file = imgInput.files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = e => executeSave(e.target.result);
    reader.readAsDataURL(file);
  }else{
    executeSave(null);
  }
}

async function executeSave(img){
  const payload = {
    action: editIndex !== null ? "edit" : "add",
    index: editIndex,
    cat: catInput.value,
    text: textInput.value,
    image: img
  };

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  });

  closeModal();
  init();
}

init();

</script>

</body>
</html>
