<script>

function render(){
  const s = search.value.toLowerCase();
  let html = "";
  let catsSet = new Set(["ทั้งหมด","⭐ ปักหมุด"]);

  DATA.forEach((r,i)=>{
    const cat = r[0];
    const text = r[1];
    const status = r[2];
    const img = r[3];
    const fav = r[4] || "0";

    if(status==="deleted") return;

    catsSet.add(cat);

    if(currentCat==="⭐ ปักหมุด" && fav!=="1") return;
    if(currentCat!=="ทั้งหมด" && currentCat!=="⭐ ปักหมุด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    html += `
    <div class="card ${getColor(cat)}">

      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${fav==="1" ? "⭐" : "☆"}
      </div>

      ${img ? `<img src="${img}" class="img">` : ""}

      <div class="content">
        ${text}
      </div>

    </div>`;
  });

  grid.innerHTML = html;
}

</script>
