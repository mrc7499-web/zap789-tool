<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.dark{background:#111;color:#eee}

/* HEADER (STICKY) */
.header{
  position:sticky;
  top:0;
  z-index:10;
  background:#ff7a00;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.search{padding:8px;border-radius:8px;border:none;width:220px}

/* CATEGORY */
.categories{
  display:flex;
  gap:8px;
  overflow:auto;
}
.cat{
  background:#fff;
  padding:6px 10px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}
.cat.active{background:#000;color:#fff}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  padding:16px;
}

/* CARD */
.card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  line-height:1.5;
}
.dark .card{background:#1e1e1e}

/* COLOR BAR */
.card::before{
  content:"";
  position:absolute;
  left:0;top:0;width:5px;height:100%;
}
.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}
.orange::before{background:#f97316}

/* CATEGORY TEXT (MUTED) */
.cat-label{
  font-size:11px;
  color:#999;
  margin-bottom:4px;
}

/* VARIABLE */
.var{
  background:#eee;
  border-radius:5px;
  padding:2px 6px;
}
.dark .var{
  background:#2a2f3a;
  color:#fff;
}

/* ACTIONS */
.actions{
  position:absolute;
  top:5px;
  right:5px;
  display:none;
}
.card:hover .actions{display:block}

/* STAR */
.star{
  position:absolute;
  top:5px;
  left:5px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  opacity:0;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#fff;
  padding:20px;
  border-radius:10px;
  max-width:400px;
}
.dark .modal-content{background:#222;color:#fff}
</style>
</head>

<body>

<div class="header">
  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
  
  <div id="cats" class="categories"></div>

  <button onclick="toggleDark()">🌙</button>
  <button onclick="showHelp()">❓</button>
</div>

<div id="grid" class="grid"></div>

<div id="toast" class="toast">✅ คัดลอกแล้ว</div>

<!-- HELP -->
<div id="help" class="modal">
  <div class="modal-content">
    <h3>⚡ วิธีใช้งาน</h3>
    <p>คลิกการ์ด = คัดลอก</p>
    <p>Alt+1-4 = ข้อความด่วน</p>
    <p>{name} = ระบบใส่ให้เอง</p>
    <button onclick="hideHelp()">ปิด</button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[], ADMINS=[], CONFIG={};
let favorites=new Set();
let currentCat="ทั้งหมด";
let focusIndex=0;

/* LOAD */
async function init(){
  DATA=await fetch(`${API}?action=get`).then(r=>r.json());
  ADMINS=(await fetch(`${API}?action=admins`).then(r=>r.json())).map(x=>x[0]);
  render();
}
init();

/* VARIABLES */
function applyVars(text){
  text=text.replaceAll("{name}", ADMINS[Math.floor(Math.random()*ADMINS.length)]||"แอดมิน");
  Object.keys(CONFIG).forEach(k=>{
    text=text.replaceAll(`{${k}}`,CONFIG[k]);
  });
  return text;
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(applyVars(text));
  toast();
}

/* TOAST */
function toast(){
  toastEl.style.opacity=1;
  setTimeout(()=>toastEl.style.opacity=0,1000);
}
const toastEl=document.getElementById("toast");

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* COLOR */
function color(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  if(cat.includes("สมัคร")) return "blue";
  return "orange";
}

/* HIGHLIGHT */
function highlight(text){
  return text.replaceAll("{name}",'<span class="var">{name}</span>');
}

/* SORT */
function sorted(){
  return [...DATA.keys()].sort((a,b)=>{
    return favorites.has(b)-favorites.has(a);
  });
}

/* RENDER */
function render(){
  let html="";
  let cats=new Set(["ทั้งหมด"]);
  const s=search.value.toLowerCase();

  sorted().forEach(i=>{
    const [cat,text,status,tags,type]=DATA[i];
    if(status==="deleted") return;

    cats.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s) && !(tags||"").includes(s)) return;

    html+=`
    <div class="card ${color(cat)}" onclick="copy(\`${text}\`)">
      
      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${favorites.has(i)?"⭐":"☆"}
      </div>

      <div class="cat-label">${cat}</div>

      ${highlight(text)}

      <div class="actions">
        <button onclick="event.stopPropagation();edit(${i})">✏️</button>
        <button onclick="event.stopPropagation();del(${i})">🗑</button>
      </div>

    </div>`;
  });

  grid.innerHTML=html;

  let catHTML="";
  cats.forEach(c=>{
    catHTML+=`<div class="cat ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c} (${DATA.filter(x=>x[0]===c).length})</div>`;
  });
  catsEl.innerHTML=catHTML;
}

const grid=document.getElementById("grid");
const catsEl=document.getElementById("cats");

/* PIN */
function toggleFav(i){
  favorites.has(i)?favorites.delete(i):favorites.add(i);
  render();
}

/* EDIT */
function edit(i){
  const t=prompt("แก้",DATA[i][1]);
  if(!t) return;
  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`).then(init);
}

/* DELETE */
function del(i){
  fetch(`${API}?action=delete&row=${i}`).then(init);
}

/* KEYBOARD */
document.addEventListener("keydown",e=>{
  if(e.altKey){
    let n=parseInt(e.key);
    if(n>=1&&n<=4){
      let i=sorted()[n-1];
      if(i!==undefined) copy(DATA[i][1]);
    }
  }
});

/* HELP */
function showHelp(){help.style.display="flex"}
function hideHelp(){help.style.display="none"}
</script>

</body>
</html>
