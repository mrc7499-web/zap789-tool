<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 Admin</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f6fa;
}

header {
  background: #ff7a00;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 20px;
}

input {
  padding: 10px;
  width: 300px;
}

.card {
  background: white;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🔥 Zap789 Tool</header>

<div class="container">
  <input type="text" id="search" placeholder="ค้นหา..." onkeyup="search()">
  <div id="list"></div>
</div>

<script>
const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkr3XpU1tsvsaTXvoo7gb4VmQy7QBTK6rcAc4bzh1dcqgsfHnfeb7SOHoeo-ns92IOyrIhh5z-Ejb/pub?gid=1998216884&single=true&output=csv";

let DATA = [];

async function load() {
  const res = await fetch(API);
  const text = await res.text();

  DATA = text.split("\n").slice(1).map(row => {
    const [cat, msg] = row.split(",");
    return { cat, msg };
  });

  render(DATA);
}

function render(data) {
  const box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(d => {
    const names = ["น้องแอดมิน","น้องฟ้า","น้องมิ้นท์","น้องแป้ง"];
    const name = names[Math.floor(Math.random()*names.length)];

    let text = d.msg.replaceAll("{name}", name);

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${d.cat}</b><br>${text}`;

    div.onclick = () => {
      navigator.clipboard.writeText(text);
      alert("คัดลอกแล้ว!");
    };

    box.appendChild(div);
  });
}

function search() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = DATA.filter(d =>
    d.cat.toLowerCase().includes(q) ||
    d.msg.toLowerCase().includes(q)
  );
  render(filtered);
}

load();
</script>

</body>
</html>
