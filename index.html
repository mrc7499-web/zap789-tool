<style>
.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:5px;
  height:100%;
  border-radius:10px 0 0 10px;
}

/* ===== หมวดสี ===== */
.cat-register::before { background:#3b82f6; }   /* สมัคร */
.cat-deposit::before { background:#22c55e; }    /* ฝาก */
.cat-withdraw::before { background:#10b981; }   /* ถอน */
.cat-problem::before { background:#ef4444; }    /* ปัญหา */
.cat-warning::before { background:#f97316; }    /* เตือน/บัญชี */
.cat-system::before { background:#6366f1; }     /* ระบบ/เข้าเล่น */
.cat-game::before { background:#a855f7; }       /* เกม */
.cat-vip::before { background:#eab308; }        /* โปร/เครดิตฟรี */
.cat-chat::before { background:#ec4899; }       /* แชท/ทัก */
.cat-default::before { background:#94a3b8; }    /* อื่น */

/* ===== เพิ่มความอ่านง่าย ===== */
.card:hover {
  transform: translateY(-3px);
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}
</style>

<script>
function getColor(cat){

  if(cat.includes("สมัคร")) return "cat-register";

  if(cat.includes("ฝาก")) return "cat-deposit";

  if(cat.includes("ถอน")) return "cat-withdraw";

  if(cat.includes("ปัญหา")) return "cat-problem";

  if(cat.includes("บัญชี") || cat.includes("เตือน")) return "cat-warning";

  if(cat.includes("ระบบ") || cat.includes("เข้า") || cat.includes("เล่น")) return "cat-system";

  if(cat.includes("เกม")) return "cat-game";

  if(cat.includes("โปร") || cat.includes("เครดิตฟรี")) return "cat-vip";

  if(cat.includes("แชท") || cat.includes("ทัก")) return "cat-chat";

  return "cat-default";
}
</script>
