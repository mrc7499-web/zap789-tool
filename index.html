<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 Admin Tool</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
}

.header {
  background:#ff7a00;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.container {
  display:flex;
}

.sidebar {
  width:200px;
  background:#fff;
  padding:10px;
  border-right:1px solid #ddd;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background:#eee;
  cursor:pointer;
}

.sidebar button.active {
  background:#ff7a00;
  color:#fff;
}

.main {
  flex:1;
  padding:15px;
}

.topbar {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input, select {
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  cursor:pointer;
}

.card {
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.actions {
  margin-top:8px;
}

.actions button {
  margin-right:5px;
  border:none;
  padding:5px 8px;
  border-radius:6px;
}

.edit { background:#3498db; color:#fff; }
.delete { background:#e74c3c; color:#fff; }

</style>
</head>

<body>

<div class="header">🔥 Zap789 Admin Tool</div>

<div class="container">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="topbar">
  <input id="search" placeholder="🔍 ค้นหา..." oninput="render()">
  <input id="input" placeholder="ข้อความใหม่">
  <select id="cat"></select>
  <button onclick="addItem()">➕ เพิ่ม</button>
</div>

<div id="list"></div>

</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let data = [];
let currentCat = "ทั้งหมด";

const names = ["น้องแอดมิน 💕","น้องมิ้นท์ 🌸","น้องฟ้า ☁️","น้องมายด์ 🌼"];

function randomName() {
  return names[Math.floor(Math.random()*names.length)];
}

async function loadData() {
  const res = await fetch(API_URL);
  data = await res.json();
  render();
}

function getCats() {
  const cats = [...new Set(data.slice(1).map(r=>r[0]))];
  return ["ทั้งหมด", ...cats];
}

function renderSidebar() {
  const cats = getCats();
  const el = document.getElementById("sidebar");
  el.innerHTML = "";

  cats.forEach(c=>{
    el.innerHTML += `<button class="${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</button>`;
  });

  const select = document.getElementById("cat");
  select.innerHTML = cats.filter(c=>c!="ทั้งหมด").map(c=>`<option>${c}</option>`).join("");
}

function render() {
  renderSidebar();

  const list = document.getElementById("list");
  const search = document.getElementById("search").value;

  let rows = data.slice(1);

  if (currentCat !== "ทั้งหมด") {
    rows = rows.filter(r => r[0] === currentCat);
  }

  if (search) {
    rows = rows.filter(r => r[1].includes(search));
  }

  list.innerHTML = rows.map(r=>{
    let text = r[1].replace("{name}", randomName());

    return `
    <div class="card">
      ${text}
      <div class="actions">
        <button class="edit" onclick="editItem('${r[0]}','${r[1]}')">✏️</button>
        <button class="delete" onclick="deleteItem('${r[0]}','${r[1]}')">🗑</button>
      </div>
    </div>
    `;
  }).join("");
}

function addItem() {
  const text = document.getElementById("input").value;
  const cat = document.getElementById("cat").value;

  if (!text) return alert("ใส่ข้อความก่อน");

  fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"add",
      cat,
      text
    })
  }).then(()=>location.reload());
}

function deleteItem(cat, text) {
  if (!confirm("ลบข้อความนี้?")) return;

  fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"delete",
      cat,
      text
    })
  }).then(()=>location.reload());
}

function editItem(cat, text) {
  const newText = prompt("แก้ข้อความ:", text);
  if (!newText) return;

  fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"edit",
      oldCat:cat,
      oldText:text,
      newCat:cat,
      newText:newText
    })
  }).then(()=>location.reload());
}

loadData();
</script>

</body>
</html>
