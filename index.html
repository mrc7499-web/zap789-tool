<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 Admin Tool</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f6fa;
}

/* TOP BAR */
.top{
  background:#ff7a00;
  color:#fff;
  padding:15px;
  font-size:20px;
  text-align:center;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
}

.btn{
  display:block;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  cursor:pointer;
  width:100%;
}

.active{ background:#ff7a00; color:#fff; }
.gray{ background:#eee; }

/* MAIN */
.main{
  flex:1;
  padding:15px;
  overflow:auto;
}

/* SEARCH */
.search{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

/* CARD */
.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.card b{ color:#ff7a00; }

/* ACTION */
.actions{
  margin-top:8px;
}

.actions button{
  margin-right:5px;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

.edit{ background:#ffc107; }
.del{ background:#ff4d4f; color:#fff; }

/* ADD BOX */
.addbox{
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
  border:1px solid #ddd;
}

.addbox input, .addbox select{
  margin:5px;
  padding:8px;
}
</style>
</head>

<body>

<div class="top">🔥 Zap789 Admin Tool</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button class="btn active" onclick="setCat('ทั้งหมด')">ทั้งหมด</button>
    <button class="btn gray" onclick="setCat('ทักทาย')">ทักทาย</button>
    <button class="btn gray" onclick="setCat('สมัคร')">สมัคร</button>
    <button class="btn gray" onclick="setCat('ฝากถอน')">ฝากถอน</button>
    <button class="btn gray" onclick="setCat('โปร')">โปร</button>
    <button class="btn gray" onclick="setCat('ปัญหา')">ปัญหา</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <input class="search" placeholder="🔍 ค้นหา..." oninput="searchMsg(this.value)">

    <!-- ADD -->
    <div class="addbox">
      <input id="newMsg" placeholder="ข้อความใหม่">
      <select id="newType">
        <option>ทักทาย</option>
        <option>สมัคร</option>
        <option>ฝากถอน</option>
        <option>โปร</option>
        <option>ปัญหา</option>
      </select>
      <button onclick="addMsg()">➕ เพิ่ม</button>
    </div>

    <div id="list"></div>

  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlkr3XpU1tsvsaTXvoo7gb4VmQy7QBTK6rcAc4bzh1dcqgsfHnfeb7SOHoeo-ns92IOyrIhh5z-Ejb/pub?gid=1998216884&single=true&output=csv";

let data=[];
let current="ทั้งหมด";

const names=["น้องแอดมิน","น้องฟ้า","น้องมิ้นท์","น้องแป้ง"];

function randomName(){
  return names[Math.floor(Math.random()*names.length)];
}

/* LOAD */
async function load(){
  const res=await fetch(CSV_URL);
  const text=await res.text();

  const rows=text.split("\n").slice(1);

  data=rows.map(r=>{
    const c=r.split(",");
    return{
      id:c[0],
      msg:c[1],
      type:c[2]
    }
  });

  render();
}

/* RENDER */
function render(){
  let html="";

  data.filter(x=>{
    return current=="ทั้งหมด" || x.type==current;
  }).forEach(x=>{

    let msg=x.msg.replace("{name}", randomName());

    html+=`
    <div class="card">
      <b>${x.type}</b>
      <div>${msg}</div>

      <div class="actions">
        <button class="edit" onclick="editMsg('${x.id}','${x.msg}')">✏️</button>
        <button class="del" onclick="deleteMsg('${x.id}')">❌</button>
      </div>
    </div>
    `;
  });

  list.innerHTML=html;
}

/* SEARCH */
function searchMsg(v){
  let html="";

  data.filter(x=>x.msg.includes(v)).forEach(x=>{
    let msg=x.msg.replace("{name}", randomName());

    html+=`
    <div class="card">
      <b>${x.type}</b>
      <div>${msg}</div>
    </div>
    `;
  });

  list.innerHTML=html;
}

/* CATEGORY */
function setCat(c){
  current=c;
  render();
}

/* ADD */
async function addMsg(){
  let msg=newMsg.value;
  let type=newType.value;

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      message:msg,
      type:type,
      role:"admin"
    })
  });

  alert("เพิ่มแล้ว");
  location.reload();
}

/* DELETE */
async function deleteMsg(id){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      id:id
    })
  });

  alert("ลบแล้ว");
  location.reload();
}

/* EDIT */
async function editMsg(id,oldMsg){
  let newMsg=prompt("แก้ข้อความ:", oldMsg);

  if(!newMsg) return;

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"edit",
      id:id,
      newMessage:newMsg
    })
  });

  alert("แก้แล้ว");
  location.reload();
}

load();
</script>

</body>
</html>
