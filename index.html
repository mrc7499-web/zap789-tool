<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
:root { --primary:#ff7a00; --bg:#f4f4f4; --card:#fff; --text:#333; --var:#eee; }
body.dark { --bg:#121212; --card:#1e1e1e; --text:#eee; --var:#333; }

body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); }

.header { position:sticky; top:0; background:var(--primary); padding:10px; z-index:100; }
.top { display:flex; justify-content:space-between; align-items:center; }

.search { padding:6px 10px; border-radius:6px; border:none; }

/* categories */
.categories { display:flex; gap:8px; margin-top:10px; overflow-x:auto; }
.cat { background:#fff; padding:6px 15px; border-radius:20px; cursor:pointer; font-size:13px; }
.cat.active { background:#000; color:#fff; }

/* grid */
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; padding:15px; }

/* card */
.card { background:var(--card); border-radius:10px; overflow:hidden; position:relative; cursor:pointer; }

/* left color */
.card::before {
  content:""; position:absolute; left:0; top:0; width:4px; height:100%;
}
.green::before{background:#22c55e;}
.red::before{background:#ef4444;}
.pink::before{background:#ec4899;}
.blue::before{background:#3b82f6;}

/* star */
.star {
  position:absolute;
  top:8px;
  right:8px;
  cursor:pointer;
}

/* hover actions */
.actions {
  position:absolute;
  top:8px;
  left:10px;
  display:none;
  gap:5px;
}
.card:hover .actions { display:flex; }

.btn {
  background:rgba(0,0,0,.7);
  color:#fff;
  padding:3px 6px;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
}

/* image */
.img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

/* text */
.content { padding:12px; }

.var {
  background:var(--var);
  padding:2px 5px;
  border-radius:4px;
  font-weight:bold;
}

/* toast */
.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:50px;
  opacity:0;
  transition:.3s;
}

/* login */
.login {
  position:fixed;
  inset:0;
  background:#0008;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box {
  background:#fff;
  padding:20px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login">
  <div class="login-box">
    <input id="user" placeholder="username">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="top">
    <b style="color:white">🔥 Zap789</b>
    <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
    <div>
      <button onclick="toggleDark()">🌙</button>
    </div>
  </div>
  <div id="cats" class="categories"></div>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast">✅ คัดลอกสำเร็จ</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA = [];
let currentCat = "ทั้งหมด";

/* LOGIN */
async function login(){
  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:user.value,
      password:pass.value
    })
  });

  const data = await res.json();

  if(data.status==="ok"){
    localStorage.setItem("login","1");
    loginBox.style.display="none";
    init();
  } else {
    alert("login failed");
  }
}

/* INIT */
async function init(){
  const res = await fetch(API_URL);
  DATA = await res.json();
  render();
}

/* AUTO LOGIN */
if(localStorage.getItem("login")==="1"){
  loginBox.style.display="none";
  init();
}

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = 1;
  setTimeout(()=>t.style.opacity=0,1200);
}

/* COLOR */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  return "blue";
}

/* COPY TEXT + NAME */
async function copyText(text){
  const res = await fetch(API_URL+"?action=name");
  const d = await res.json();

  const final = text.replace(/{name}/g,d.name);
  navigator.clipboard.writeText(final);

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({action:"log",text:final})
  });

  toast("✅ คัดลอกสำเร็จ");
}

/* COPY IMAGE */
async function copyImage(url){
  const res = await fetch(url);
  const blob = await res.blob();

  await navigator.clipboard.write([
    new ClipboardItem({[blob.type]:blob})
  ]);

  toast("✅ คัดลอกสำเร็จ");
}

/* FAV */
async function toggleFav(id){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({action:"fav",id})
  });
  init();
}

/* RENDER */
function render(){
  const s = search.value.toLowerCase();
  let html = "";
  let catsSet = new Set(["ทั้งหมด","⭐ ปักหมุด"]);

  DATA.forEach(r=>{
    const [id,cat,text,status,img,fav] = r;
    if(status==="deleted") return;

    catsSet.add(cat);

    if(currentCat==="⭐ ปักหมุด" && fav!=="1") return;
    if(currentCat!=="ทั้งหมด" && currentCat!=="⭐ ปักหมุด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card ${getColor(cat)}">

      <div class="actions">
        <div class="btn">✏️</div>
        <div class="btn">🗑️</div>
      </div>

      <div class="star" onclick="event.stopPropagation();toggleFav('${id}')">
        ${fav==="1" ? "⭐" : "☆"}
      </div>

      ${img ? `<img src="${img}" class="img" onclick="event.stopPropagation();copyImage('${img}')">` : ""}

      <div class="content" onclick="copyText(\`${text}\`)">
        ${text.replace(/{name}/g,'<span class="var">{name}</span>')}
      </div>
    </div>`;
  });

  grid.innerHTML = html;

  let cHTML="";
  catsSet.forEach(c=>{
    cHTML+=`<div class="cat ${c===currentCat?"active":""}" onclick="currentCat='${c}';render()">${c}</div>`;
  });

  cats.innerHTML=cHTML;
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
