<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Zap789 PRO | Stable Version</title>
    <style>
        :root { --primary: #ff7a00; --bg: #f4f4f4; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); }
        .header { position: sticky; top: 0; background: var(--primary); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search { padding: 8px 15px; border-radius: 20px; border: none; width: 200px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; border-left: 5px solid #3b82f6; }
        .card:hover { transform: translateY(-3px); }
        .img-box { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 1px solid #eee; }
        .content { padding: 12px; font-size: 14px; line-height: 1.5; color: #333; }
        .var { background: #fff3e0; padding: 2px 5px; border-radius: 4px; color: #ff7a00; font-weight: bold; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: .3s; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <b style="font-size: 20px;">🔥 Zap789 PRO</b>
    <input type="text" id="search" class="search" placeholder="🔍 ค้นหา..." oninput="render()">
</div>

<div id="loading" style="text-align:center; padding:50px; color:#ff7a00;">⏳ กำลังโหลดข้อมูล...</div>
<div id="grid" class="grid"></div>
<div id="toast" class="toast">✅ คัดลอกสำเร็จ</div>

<script>
// --- วาง URL ที่ได้จากการ Deploy ตรงนี้ ---
const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA = [];

async function init() {
    try {
        const res = await fetch(API_URL + "?action=get");
        const json = await res.json();
        DATA = json;
        document.getElementById('loading').style.display = 'none';
        render();
    } catch(e) {
        document.getElementById('loading').innerHTML = "⚠️ เชื่อมต่อไม่ได้! <br><small>กรุณาตรวจสอบว่าเลือก 'Anyone' ตอน Deploy หรือยัง</small>";
    }
}

function render() {
    const s = document.getElementById('search').value.toLowerCase();
    let html = "";
    DATA.forEach(r => {
        const [cat, text, status, img] = r;
        if (status === "deleted") return;
        if (s && !text.toLowerCase().includes(s)) return;
        html += `
        <div class="card" onclick="copyT(\`${text}\`)">
            ${img ? `<img src="${img}" class="img-box" onclick="event.stopPropagation(); copyI('${img}')">` : ""}
            <div class="content">${text.replace(/{name}/g, '<span class="var">{name}</span>')}</div>
        </div>`;
    });
    document.getElementById('grid').innerHTML = html;
}

async function copyT(t) {
    await navigator.clipboard.writeText(t);
    toast("✅ คัดลอกข้อความแล้ว");
}

async function copyI(url) {
    try {
        const res = await fetch(url);
        const blob = await res.blob();
        await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
        toast("🖼️ คัดลอกรูปภาพแล้ว");
    } catch(e) { window.open(url, '_blank'); }
}

function toast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 1000);
}

init();
</script>
</body>
</html>
