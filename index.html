<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.dark{background:#111;color:#eee}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#ff7a00;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

.search{
  padding:8px;
  border-radius:8px;
  border:none;
  width:240px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  padding:18px;
}

/* CARD */
.card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  line-height:1.5;
}
.dark .card{background:#1e1e1e}

/* COLOR */
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:5px;
  height:100%;
}
.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}

/* ACTION */
.actions{
  position:absolute;
  top:5px;
  right:5px;
  display:none;
}
.card:hover .actions{display:block}

/* STAR */
.star{
  position:absolute;
  top:5px;
  left:5px;
}

/* VARIABLE */
.var{
  background:#eee;
  padding:2px 6px;
  border-radius:5px;
}
.dark .var{background:#333;color:#fff}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  opacity:0;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🔥 Zap789 OWNER</div>

  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">

  <button onclick="toggleDark()">🌙</button>
</div>

<div id="grid" class="grid"></div>
<div id="toast" class="toast">✅ คัดลอกแล้ว</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let ADMINS=[];
let favorites=new Set();

/* 🚀 โหลดครั้งเดียว (เร็วขึ้นโคตรๆ) */
async function init(){
  const [data, admins] = await Promise.all([
    fetch(`${API}?action=get`).then(r=>r.json()),
    fetch(`${API}?action=admins`).then(r=>r.json())
  ]);

  DATA=data;
  ADMINS=admins.map(x=>x[0]);

  render();
}
init();

/* RANDOM NAME */
function randomName(){
  return ADMINS[Math.floor(Math.random()*ADMINS.length)] || "แอดมิน";
}

/* COPY */
function copy(text){
  navigator.clipboard.writeText(text.replaceAll("{name}",randomName()));
  showToast();
}

/* TOAST */
function showToast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,800);
}

/* COLOR */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  return "blue";
}

/* PIN */
function toggleFav(i){
  favorites.has(i)?favorites.delete(i):favorites.add(i);
  render();
}

/* SORT */
function sorted(){
  return [...DATA.keys()].sort((a,b)=>favorites.has(b)-favorites.has(a));
}

/* RENDER (เร็ว ไม่มี fetch ซ้ำ) */
function render(){
  const s=(search.value||"").toLowerCase();
  let html="";

  sorted().forEach(i=>{
    const [cat,text,status]=DATA[i];
    if(status==="deleted") return;

    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card ${getColor(cat)}" onclick="copy(\`${text}\`)">

      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${favorites.has(i)?"⭐":"☆"}
      </div>

      ${text.replaceAll("{name}",'<span class="var">{name}</span>')}

      <div class="actions">
        <button onclick="event.stopPropagation();edit(${i})">✏️</button>
      </div>

    </div>`;
  });

  grid.innerHTML=html;
}

/* EDIT (ไม่ reload หน้าแล้ว → เร็วขึ้น) */
function edit(i){
  const t=prompt("แก้",DATA[i][1]);
  if(!t) return;

  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`)
  .then(()=>{
    DATA[i][1]=t;
    render();
  });
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
