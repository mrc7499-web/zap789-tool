<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO | Perfect Edition</title>

<style>
:root {
  --primary:#ff7a00;
  --bg:#f4f4f4;
  --card-bg:#ffffff;
  --text:#333;
  --var-bg:#eee;

  /* COLOR */
  --blue-soft:#e0f2fe;
  --blue-strong:#0284c7;

  --green-soft:#dcfce7;
  --green-strong:#16a34a;

  --purple-soft:#ede9fe;
  --purple-strong:#6d28d9;

  --pink-soft:#fce7f3;
  --pink-strong:#db2777;

  --red-soft:#fee2e2;
  --red-strong:#dc2626;
}

body.dark { --bg:#121212; --card-bg:#1e1e1e; --text:#efefef; --var-bg:#333; }
body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
.header { background:var(--primary); padding:10px; }
.top { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto; }
.search { padding:8px 15px; border-radius:8px; border:none; width:250px; }

/* LAYOUT */
.layout { display:flex; height:calc(100vh - 60px); }

.sidebar {
  width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
  overflow-y:auto;
}

/* SIDEBAR */
.cat {
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  background:#fff;
  border-left:4px solid transparent;
}
.cat:hover { background:#f1f5f9; }

.cat.blue { background:var(--blue-soft); border-left-color:var(--blue-strong); }
.cat.green { background:var(--green-soft); border-left-color:var(--green-strong); }
.cat.purple { background:var(--purple-soft); border-left-color:var(--purple-strong); }
.cat.pink { background:var(--pink-soft); border-left-color:var(--pink-strong); }
.cat.red { background:var(--red-soft); border-left-color:var(--red-strong); }

.cat.active {
  background:var(--primary);
  color:#fff;
  border-left-color:var(--primary);
}

/* ===== GROUP SECTION ===== */
.section { margin-bottom:40px; }

.section-title {
  font-size:16px;
  font-weight:700;
  margin:10px 15px;
  padding-bottom:6px;
  border-bottom:2px solid #eee;
}

.section-box {
  background:#f9f9f9;
  border-radius:10px;
  padding:10px 5px;
}

.main { flex:1; overflow-y:auto; }

/* ===== ORIGINAL GRID ===== */
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; padding:15px; max-width:1400px; margin:0 auto; }

.card {
  background:var(--card-bg);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.15s;
}
.card:active { transform:scale(0.96); opacity:0.85; }

.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
}

.card.blue::before { background:var(--blue-strong); }
.card.green::before { background:var(--green-strong); }
.card.purple::before { background:var(--purple-strong); }
.card.pink::before { background:var(--pink-strong); }
.card.red::before { background:var(--red-strong); }

.actions {
  position:absolute;
  top:8px;
  left:12px;
  display:none;
  gap:5px;
}
.card:hover .actions { display:flex; }

.btn-action {
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:4px 8px;
  border-radius:5px;
  font-size:12px;
}

.img-box {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.content {
  padding:12px;
  font-size:14px;
}

.var {
  background:var(--var-bg);
  padding:2px 5px;
  border-radius:4px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div style="font-weight:bold;color:white;">🔥 Zap789 PRO</div>
    <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="cats"></div>
  </div>

  <div class="main">
    <div id="grid"></div>
  </div>
</div>

<script>

const COLOR_MAP = {
  "ทั้งหมด":"blue",
  "สมัคร":"blue",
  "ขอข้อมูล":"blue",
  "เปลี่ยนรหัส":"blue",
  "เปลี่ยนบัญชี":"blue",

  "ฝากเงิน":"green",
  "VPN":"green",
  "เน็ตช้า":"green",

  "ถอนเงิน":"purple",
  "รอถอน":"purple",

  "กำลังใจ":"pink",

  "ปัญหา":"red",
  "ลูกค้าด่า":"red"
};

function getColor(cat){
  if(COLOR_MAP[cat]) return COLOR_MAP[cat];
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ถอน")) return "purple";
  if(cat.includes("ปัญหา")) return "red";
  return "blue";
}

function getGroupName(color){
  if(color==="blue") return "💳 บัญชีและข้อมูล";
  if(color==="green") return "💰 การเงิน / ฝาก";
  if(color==="purple") return "💸 ถอนเงิน";
  if(color==="red") return "⚠️ ปัญหา";
  if(color==="pink") return "💖 ทั่วไป";
  return "อื่นๆ";
}

/* ===== MOCK DATA ===== */
const DATA = [
  ["สมัคร","ข้อความ1"],
  ["ฝากเงิน","ข้อความ2"],
  ["ถอนเงิน","ข้อความ3"],
  ["ปัญหา","ข้อความ4"],
  ["กำลังใจ","ข้อความ5"]
];

let currentCat="ทั้งหมด";

function render(){

  let groups = {blue:[],green:[],purple:[],red:[],pink:[]};

  DATA.forEach((r,i)=>{
    const [cat,text]=r;
    const color=getColor(cat);

    groups[color].push(`
      <div class="card ${color}">
        <div class="content">${text}</div>
      </div>
    `);
  });

  let html="";

  Object.keys(groups).forEach(color=>{
    if(groups[color].length){
      html+=`
      <div class="section">
        <div class="section-title">${getGroupName(color)}</div>
        <div class="section-box">
          <div class="grid">
            ${groups[color].join("")}
          </div>
        </div>
      </div>`;
    }
  });

  grid.innerHTML=html;
}

render();

</script>

</body>
</html>
