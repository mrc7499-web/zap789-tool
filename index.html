<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Zap789 PRO | Perfect Edition</title>

<style>
:root {
  --primary:#ff7a00;
  --bg:#f4f4f4;
  --card-bg:#ffffff;
  --text:#333;
  --var-bg:#eee;

  --blue-strong:#0284c7;
  --green-strong:#16a34a;
  --purple-strong:#6d28d9;
  --pink-strong:#db2777;
  --red-strong:#dc2626;
}

body.dark { --bg:#121212; --card-bg:#1e1e1e; --text:#efefef; --var-bg:#333; }
body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
.header { background:var(--primary); padding:10px; }
.top { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto; }
.search { padding:8px 15px; border-radius:8px; border:none; width:250px; }

/* LAYOUT */
.layout { display:flex; height:calc(100vh - 60px); }

.sidebar {
  width:260px;
  background:#fff;
  border-right:1px solid #ddd;
  padding:10px;
  overflow-y:auto;
}

/* SIDEBAR */
.cat {
  padding:10px 14px;
  cursor:pointer;
  border-left:4px solid transparent;
}
.cat:hover { background:#f1f5f9; }

.cat.blue { border-left-color:var(--blue-strong); }
.cat.green { border-left-color:var(--green-strong); }
.cat.purple { border-left-color:var(--purple-strong); }
.cat.pink { border-left-color:var(--pink-strong); }
.cat.red { border-left-color:var(--red-strong); }

.cat.active {
  background:var(--primary);
  color:#fff;
}

/* MAIN */
.main { flex:1; overflow-y:auto; }

/* SECTION */
.section { margin-bottom:40px; }

.section-title {
  margin:10px 15px;
  font-weight:bold;
  border-bottom:1px solid #eee;
  padding-bottom:6px;
}

/* GRID (เดิม) */
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; padding:15px; max-width:1400px; margin:0 auto; }

/* CARD (เดิมทั้งหมด) */
.card {
  background:var(--card-bg);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:.15s;
}
.card:active { transform:scale(0.96); opacity:0.85; }

.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:4px;
  height:100%;
}

.card.blue::before { background:var(--blue-strong); }
.card.green::before { background:var(--green-strong); }
.card.purple::before { background:var(--purple-strong); }
.card.pink::before { background:var(--pink-strong); }
.card.red::before { background:var(--red-strong); }

.actions {
  position:absolute;
  top:8px;
  left:12px;
  display:none;
  gap:5px;
  z-index:10;
}
.card:hover .actions { display:flex; }

.btn-action {
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:4px 8px;
  border-radius:5px;
  font-size:12px;
  cursor:pointer;
}

.img-box {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}

.content {
  padding:12px;
  font-size:14px;
}

.var {
  background:var(--var-bg);
  padding:2px 5px;
  border-radius:4px;
  font-weight:bold;
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 20px;
  border-radius:50px;
  opacity:0;
  transition:.3s;
}

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:350px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.input-ui {
  padding:10px;
  border-radius:6px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div style="font-weight:bold;color:white;">🔥 Zap789 PRO</div>
    <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">
    <div>
      <button onclick="openModal()">+ เพิ่ม</button>
      <button onclick="toggleDark()">🌙</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div id="cats"></div>
  </div>

  <div class="main">
    <div id="grid"></div>
  </div>
</div>

<div id="toast" class="toast">✅ คัดลอกสำเร็จ</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <input id="catInput" class="input-ui" placeholder="หมวด">
    <textarea id="textInput" class="input-ui"></textarea>
    <input type="file" id="imgInput">
    <button onclick="save()">บันทึก</button>
    <button onclick="closeModal()">ยกเลิก</button>
  </div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[];
let currentCat="ทั้งหมด";
let editIndex=null;

/* COLOR */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ถอน")) return "purple";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("กำลังใจ")) return "pink";
  return "blue";
}

function getGroupName(color){
  if(color==="blue") return "💳 บัญชีและข้อมูล";
  if(color==="green") return "💰 การเงิน ฝาก-ถอน";
  if(color==="purple") return "💸 การถอนเงิน";
  if(color==="red") return "⚠️ ปัญหาและแก้ไข";
  if(color==="pink") return "💖 ทั่วไป / โปรโมท";
  return "📁 อื่นๆ";
}

/* INIT */
async function init(){
  const res=await fetch(API_URL+"?t="+Date.now());
  DATA=await res.json();
  render();
}

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1200);
}

/* COPY */
async function copyText(text){
  await navigator.clipboard.writeText(text);
  showToast("✅ คัดลอกสำเร็จ");
}

async function copyImage(url){
  const res=await fetch(url);
  const blob=await res.blob();
  await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
  showToast("✅ คัดลอกสำเร็จ");
}

/* RENDER (แก้แล้ว) */
function render(){
  const s = search.value.toLowerCase();

  let groups = {blue:[],green:[],purple:[],red:[],pink:[]};
  let catsSet = new Set(["ทั้งหมด"]);

  DATA.forEach((r,i)=>{
    const [cat,text,status,img]=r;
    if(status==="deleted") return;

    catsSet.add(cat);

    if(currentCat!=="ทั้งหมด" && cat!==currentCat) return;
    if(s && !text.toLowerCase().includes(s)) return;

    const color = getColor(cat);

    groups[color].push(`
      <div class="card ${color}" onclick="copyText(\`${text}\`)">

        <div class="actions">
          <div class="btn-action" onclick="event.stopPropagation();edit(${i})">✏️</div>
          <div class="btn-action" onclick="event.stopPropagation();removeItem(${i})">🗑️</div>
        </div>

        ${img ? `<img src="${img}" class="img-box" onclick="event.stopPropagation();copyImage('${img}')">` : ""}

        <div class="content">
          ${text.replace(/{name}/g,'<span class="var">{name}</span>')}
        </div>

      </div>
    `);
  });

  let html="";
  Object.keys(groups).forEach(color=>{
    if(groups[color].length){
      html+=`
        <div class="section">
          <div class="section-title">${getGroupName(color)}</div>
          <div class="grid">
            ${groups[color].join("")}
          </div>
        </div>
      `;
    }
  });

  grid.innerHTML=html;

  let cHTML="";
  catsSet.forEach(c=>{
    cHTML+=`
      <div class="cat ${getColor(c)} ${c===currentCat?"active":""}"
      onclick="currentCat='${c}';render()">
      ${c}
      </div>
    `;
  });

  cats.innerHTML=cHTML;
}

/* CRUD */
function openModal(){ editIndex=null; modal.style.display="flex"; }
function closeModal(){ modal.style.display="none"; }

function edit(i){
  editIndex=i;
  catInput.value=DATA[i][0];
  textInput.value=DATA[i][1];
  modal.style.display="flex";
}

async function removeItem(i){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({action:"delete",index:i})
  });
  init();
}

function save(){
  const file=imgInput.files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=e=>executeSave(e.target.result);
    reader.readAsDataURL(file);
  }else{
    executeSave(null);
  }
}

async function executeSave(img){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:editIndex!==null?"edit":"add",
      index:editIndex,
      cat:catInput.value,
      text:textInput.value,
      image:img
    })
  });

  closeModal();
  init();
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

init();
</script>

</body>
</html>
