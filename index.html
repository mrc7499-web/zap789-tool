<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zap789 Dashboard</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}

/* HEADER */
.header{
  background:#ff7a00;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.search{
  padding:8px;
  border-radius:8px;
  border:none;
  width:250px;
}

.toggle{
  background:#fff;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* GRID (แก้ให้กว้างขึ้น อ่านง่าย) */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  transition:.2s;
}
.card:hover{transform:scale(1.02)}

/* COLOR BAR */
.card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  border-radius:12px 0 0 12px;
}

.green::before{background:#22c55e}
.red::before{background:#ef4444}
.pink::before{background:#ec4899}
.blue::before{background:#3b82f6}
.orange::before{background:#f97316}

/* ACTION (ซ่อนจน hover) */
.actions{
  position:absolute;
  top:8px;
  right:8px;
  display:none;
}
.card:hover .actions{display:block}

/* STAR */
.star{
  position:absolute;
  top:8px;
  left:8px;
  cursor:pointer;
}

/* VARIABLE HIGHLIGHT */
.var{
  background:#ffe4c7;
  padding:2px 4px;
  border-radius:4px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div class="header">
  🔥 Zap789 PRO

  <input id="search" class="search" placeholder="ค้นหา..." oninput="render()">

  <div class="toggle" onclick="toggleMode()">
    ⚙️ <span id="modeText">โหมดตอบแชท</span>
  </div>
</div>

<div id="grid" class="grid"></div>

<div id="toast" class="toast">✅ คัดลอกแล้ว</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA=[], ADMINS=[];
let editMode=false;
let favorites=new Set();

/* LOAD */
fetch(`${API}?action=get`)
.then(r=>r.json())
.then(d=>{
  DATA=d;
  render();
});

fetch(`${API}?action=admins`)
.then(r=>r.json())
.then(d=>{
  ADMINS=d.map(x=>x[0]);
});

/* RANDOM NAME */
function randomName(){
  return ADMINS[Math.floor(Math.random()*ADMINS.length)] || "แอดมิน";
}

/* TOAST */
function toast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

/* COPY */
function copy(text){
  const final=text.replaceAll("{name}",randomName());
  navigator.clipboard.writeText(final);
  toast();
}

/* MODE */
function toggleMode(){
  editMode=!editMode;
  modeText.innerText = editMode ? "โหมดแก้ไข" : "โหมดตอบแชท";
  render();
}

/* COLOR */
function getColor(cat){
  if(cat.includes("ฝาก")) return "green";
  if(cat.includes("ปัญหา")) return "red";
  if(cat.includes("ทัก")) return "pink";
  if(cat.includes("สมัคร")) return "blue";
  return "orange";
}

/* PIN */
function toggleFav(i){
  if(favorites.has(i)) favorites.delete(i);
  else favorites.add(i);
  render();
}

/* HIGHLIGHT {name} */
function highlight(text){
  return text.replaceAll("{name}", `<span class="var">{name}</span>`);
}

/* RENDER */
function render(){
  let html="";
  const s=search.value.toLowerCase();

  // เรียง favorites ขึ้นก่อน
  let sorted=[...DATA.keys()].sort((a,b)=>{
    return (favorites.has(b)-favorites.has(a));
  });

  sorted.forEach(i=>{
    const [cat,text,status]=DATA[i];
    if(status==="deleted") return;
    if(s && !text.toLowerCase().includes(s)) return;

    html+=`
    <div class="card ${getColor(cat)}" onclick="copy(\`${text}\`)">

      <div class="star" onclick="event.stopPropagation();toggleFav(${i})">
        ${favorites.has(i) ? "⭐" : "☆"}
      </div>

      <b>${cat}</b><br><br>
      ${highlight(text)}

      ${editMode ? `
      <div class="actions">
        <button onclick="event.stopPropagation(); edit(${i},\`${text}\`)">✏️</button>
        <button onclick="event.stopPropagation(); del(${i})">🗑</button>
      </div>
      `:""}

    </div>`;
  });

  grid.innerHTML=html;
}

/* EDIT */
function edit(i,old){
  const t=prompt("แก้ไข",old);
  if(!t) return;

  fetch(`${API}?action=edit&row=${i}&text=${encodeURIComponent(t)}`)
  .then(()=>location.reload());
}

/* DELETE */
function del(i){
  fetch(`${API}?action=delete&row=${i}`)
  .then(()=>location.reload());
}
</script>

</body>
</html>
