<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxHezmPZRW5x-PIEx7iPK5joGxshgIG_aN7wF0NvAl0FkIS0fgqnEKOI8oYR1RZN5cf/exec";

let DATA = [];
let currentCat = "ทั้งหมด";

// โหลดข้อมูล
async function init() {
    try {
        const res = await fetch(API_URL + "?action=get");
        DATA = await res.json();

        if (!Array.isArray(DATA)) {
            console.error("API ERROR:", DATA);
            alert("❌ ดึงข้อมูลไม่ได้ (ดู console)");
            return;
        }

        render();
    } catch(e) {
        console.error("Fetch Error:", e);
        alert("❌ โหลดข้อมูลไม่สำเร็จ");
    }
}

// 🎲 copy + สุ่มชื่อ
async function copyText(index) {
    try {
        const row = DATA[index];
        const [cat, text] = row;

        // สุ่มชื่อ
        const res = await fetch(API_URL + "?action=randomName");
        const data = await res.json();
        const name = data.name || "ลูกค้า";

        // แทน {name}
        const finalText = text.replace(/{name}/g, name);

        // copy
        await navigator.clipboard.writeText(finalText);

        // log
        fetch(API_URL + "?action=log"
            + "&name=" + encodeURIComponent(name)
            + "&text=" + encodeURIComponent(text)
            + "&cat=" + encodeURIComponent(cat)
        );

        showToast("✅ " + name);

    } catch(e) {
        console.error(e);
        showToast("❌ error");
    }
}

// toast
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.opacity = 1;
    setTimeout(() => t.style.opacity = 0, 1200);
}

// render
function render() {
    const s = document.getElementById('search').value.toLowerCase();
    let html = "";
    let catsSet = new Set(["ทั้งหมด"]);

    DATA.forEach((r, i) => {
        const [cat, text, status, img] = r;

        if (status === "deleted") return;

        catsSet.add(cat);

        if (currentCat !== "ทั้งหมด" && cat !== currentCat) return;
        if (s && !text.toLowerCase().includes(s)) return;

        html += `
        <div class="card ${getColor(cat)}">
            <div class="content" onclick="copyText(${i})">
                ${escapeHTML(text).replace(/{name}/g, '<span class="var">{name}</span>')}
            </div>
        </div>`;
    });

    document.getElementById('grid').innerHTML = html;

    let cHTML = "";
    catsSet.forEach(c => {
        cHTML += `<div class="cat ${c === currentCat ? "active" : ""}" onclick="setCat('${escapeHTML(c)}')">${c}</div>`;
    });

    document.getElementById('cats').innerHTML = cHTML;
}

// กัน HTML พัง
function escapeHTML(str) {
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function setCat(c) {
    currentCat = c;
    render();
}

// สี
function getColor(cat) {
    if (cat.includes("ฝาก") || cat.includes("ถอน")) return "green";
    if (cat.includes("ปัญหา")) return "red";
    if (cat.includes("ทัก")) return "pink";
    return "blue";
}

init();
</script>
