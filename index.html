<style>

/* ===== COLOR PALETTE ===== */
:root {
  --blue-soft:#e0f2fe;
  --blue-strong:#0284c7;

  --green-soft:#dcfce7;
  --green-strong:#16a34a;

  --purple-soft:#ede9fe;
  --purple-strong:#6d28d9;

  --pink-soft:#fce7f3;
  --pink-strong:#db2777;

  --red-soft:#fee2e2;
  --red-strong:#dc2626;
}

/* ===== SIDEBAR BUTTON ===== */
.cat {
  padding:10px 14px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  font-weight:500;
  transition:.2s;
  background:#fff;
  color:#333;
  border-left:4px solid transparent;
}

/* hover */
.cat:hover { background:#f1f5f9; }

/* ===== CATEGORY COLORS ===== */
.cat.blue {
  background:var(--blue-soft);
  border-left-color:var(--blue-strong);
}

.cat.green {
  background:var(--green-soft);
  border-left-color:var(--green-strong);
}

.cat.purple {
  background:var(--purple-soft);
  border-left-color:var(--purple-strong);
}

.cat.pink {
  background:var(--pink-soft);
  border-left-color:var(--pink-strong);
}

.cat.red {
  background:var(--red-soft);
  border-left-color:var(--red-strong);
}

/* active */
.cat.active {
  background:var(--primary);
  color:#fff;
  border-left-color:var(--primary);
  font-weight:600;
}

/* ===== CARD COLOR STRIP (RIGHT SIDE) ===== */
.card.blue::before { background:var(--blue-strong); }
.card.green::before { background:var(--green-strong); }
.card.purple::before { background:var(--purple-strong); }
.card.pink::before { background:var(--pink-strong); }
.card.red::before { background:var(--red-strong); }

</style>
